<!doctype html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UPCASH | Create Account</title>
    
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body { background-color: #0a0f1a; font-family: 'DM Sans', sans-serif; }
        .outfit { font-family: 'Outfit', sans-serif; }
        
        /* Theme Styles */
        .glass-card { 
            background: linear-gradient(160deg, #111827 0%, #0d1321 100%); 
            border: 1px solid rgba(0, 206, 156, 0.15);
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }
        
        .field { 
            width: 100%; 
            padding: 0.75rem 1rem 0.75rem 3rem; 
            border-radius: 0.75rem; 
            background: rgba(10, 15, 26, 0.5); 
            border: 1px solid rgba(255,255,255,0.05); 
            color: white; 
            outline: none; 
            transition: all 0.3s; 
        }
        .field:focus { border-color: #00CE9C; box-shadow: 0 0 10px rgba(0, 206, 156, 0.2); }
        
        .input-icon { position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: #00CE9C; opacity: 0.7; }
        
        .btn-primary {
            background: #00CE9C;
            color: #0a0f1a;
            box-shadow: 0 10px 20px rgba(0,206,156,0.2);
            transition: all 0.3s ease;
        }
        .btn-primary:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 12px 25px rgba(0,206,156,0.3); }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

        .input-error { border-color: #ef4444 !important; }
        .input-success { border-color: #00CE9C !important; }

        @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .fade-up { animation: fadeUp 0.6s ease forwards; }
    </style>
</head>
<body class="h-full flex items-center justify-center p-6">
    
    <div style="position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;overflow:hidden;z-index:0;">
        <div style="position:absolute;top:-20%;right:-15%;width:500px;height:500px;border-radius:50%;background:radial-gradient(circle,rgba(0,206,156,0.08) 0%,transparent 70%);"></div>
        <div style="position:absolute;bottom:-10%;left:-10%;width:400px;height:400px;border-radius:50%;background:radial-gradient(circle,rgba(0,206,156,0.05) 0%,transparent 70%);"></div>
    </div>

    <div class="relative z-10 w-full max-w-md fade-up">
        <div class="glass-card rounded-3xl p-8 sm:p-10">
            
            <div class="text-center mb-8">
                <h1 class="outfit font-900 text-4xl tracking-tighter text-white mb-2 uppercase">
                    UP<span style="color:#00ce9c;">CASH</span>
                </h1>
                <p class="text-xs tracking-widest text-[#00CE9C] font-bold outfit">CREATE INVESTMENT ACCOUNT</p>
            </div>

            <form id="signupForm" class="space-y-4">
                <div class="relative">
                    <i data-lucide="user" class="input-icon w-5 h-5"></i>
                    <input type="text" id="username" required placeholder="Username" class="field">
                    <div id="username-feedback" class="text-[10px] mt-1 ml-2 text-slate-500">Lowercase letters only.</div>
                </div>

                <div class="relative">
                    <i data-lucide="mail" class="input-icon w-5 h-5"></i>
                    <input type="email" id="email" required placeholder="Email Address" class="field">
                </div>

                <div class="relative">
                    <i data-lucide="phone" class="input-icon w-5 h-5"></i>
                    <input type="tel" id="phone" required placeholder="Phone Number" class="field">
                </div>

                <div class="relative">
                    <i data-lucide="lock" class="input-icon w-5 h-5"></i>
                    <input type="password" id="password" required placeholder="Create Password" class="field">
                </div>

                <div class="relative">
                    <i data-lucide="shield-check" class="input-icon w-5 h-5"></i>
                    <input type="password" id="confirmPassword" required placeholder="Confirm Password" class="field">
                    <div id="pass-feedback" class="text-[10px] mt-1 ml-2 text-red-400"></div>
                </div>

                <input type="hidden" id="referrerInput" name="referred_by" value="">

                <button type="submit" id="submitBtn" disabled class="btn-primary w-full py-4 rounded-xl outfit font-bold text-lg mt-4">
                    Register Now
                </button>
            </form>

            <div class="mt-8 text-center pt-6 border-t border-white/5">
                <p class="text-slate-500 text-sm">Already a member? <a href="signin.html" class="text-[#00CE9C] font-bold hover:underline">Sign In</a></p>
            </div>
        </div>
        
        <p class="text-center mt-6 text-[#3e4a5c] text-xs outfit tracking-widest uppercase">
            © UPCASH Platform 2026 • Secure & Encrypted
        </p>
    </div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    lucide.createIcons();

    const supabaseClient = supabase.createClient('https://wbodpfbmilhperccgzei.supabase.co', 'sb_publishable_CTQy3-UTfBu_U8kl3lWLXQ_7Ki4gukN');
    const form = document.getElementById('signupForm'), 
          usernameInput = document.getElementById('username'), 
          feedback = document.getElementById('username-feedback'), 
          pass1 = document.getElementById('password'), 
          pass2 = document.getElementById('confirmPassword'), 
          passFeed = document.getElementById('pass-feedback'), 
          submitBtn = document.getElementById('submitBtn'),
          referrerField = document.getElementById('referrerInput');
    
    // --- REFERRAL LOGIC ---
    document.addEventListener("DOMContentLoaded", () => {
        // 1. Try URL first
        const urlParams = new URLSearchParams(window.location.search);
        let referrer = urlParams.get('ref');

        // 2. If not in URL, check the "Locker" (Local Storage)
        if (!referrer) {
            referrer = localStorage.getItem('affiliate_user');
        }

        // 3. Inject into hidden field if found
        if (referrer) {
            referrerField.value = referrer;
            console.log("Referral active: " + referrer);
        }
    });

    function validateForm() {
        const isUserValid = usernameInput.classList.contains('input-success');
        const isPassMatch = pass1.value !== "" && pass1.value === pass2.value;
        submitBtn.disabled = !(isUserValid && isPassMatch);
    }

    usernameInput.addEventListener('input', (e) => {
        const sanitized = e.target.value.toLowerCase().replace(/[^a-z]/g, '');
        if (e.target.value !== sanitized) usernameInput.value = sanitized;
        
        if (sanitized.length < 4) {
            feedback.innerText = "Minimum 4 lowercase letters.";
            usernameInput.classList.remove('input-success', 'input-error');
            validateForm(); return;
        }

        feedback.innerText = "Checking...";
        clearTimeout(window.timer);
        window.timer = setTimeout(async () => {
            const { data } = await supabaseClient.from('userinfo').select('username').eq('username', sanitized).maybeSingle();
            if (data) { 
                feedback.innerText = "Username taken."; 
                feedback.style.color = "#ef4444";
                usernameInput.classList.add('input-error'); 
                usernameInput.classList.remove('input-success'); 
            }
            else { 
                feedback.innerText = "Username available"; 
                feedback.style.color = "#00CE9C";
                usernameInput.classList.remove('input-error'); 
                usernameInput.classList.add('input-success'); 
            }
            validateForm();
        }, 500);
    });

    [pass1, pass2].forEach(el => el.addEventListener('input', () => {
        passFeed.innerText = (pass2.value && pass1.value !== pass2.value) ? "Passwords do not match" : "";
        validateForm();
    }));

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        submitBtn.innerText = "Creating Account...";
        submitBtn.disabled = true;

        const { error } = await supabaseClient.auth.signUp({ 
            email: document.getElementById('email').value, 
            password: pass1.value, 
            options: { 
                data: { 
                    username: usernameInput.value, 
                    telephone: document.getElementById('phone').value,
                    referred_by: referrerField.value // Sends the saved referral
                } 
            } 
        });

        if(error) { 
            alert(error.message); 
            submitBtn.innerText = "Register Now"; 
            submitBtn.disabled = false;
        } 
        else { 
            // Cleanup on success
            localStorage.removeItem('affiliate_user');
            alert("Success! Check your email to verify your account."); 
            form.reset(); 
        }
    });
</script>
</body>
  </html>
