<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0a0f1a">
    <title>Affiliates | UPCASH</title>
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            font-family: 'DM Sans', sans-serif;
            background-color: #0a0f1a;
            color: #f8fafc;
        }
        .outfit { font-family: 'Outfit', sans-serif; }

        /* Background Glow */
        .bg-glow {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 20% 20%, rgba(0, 206, 156, 0.05) 0%, transparent 50%),
                        radial-gradient(circle at 80% 80%, rgba(0, 206, 156, 0.03) 0%, transparent 50%);
            pointer-events: none;
            z-index: -1;
        }

        .glass-card {
            background: linear-gradient(160deg, #111827 0%, #0d1321 100%); 
            border: 1px solid rgba(0, 206, 156, 0.15);
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }

        /* Skeleton Animation */
        .skeleton {
            background: linear-gradient(90deg, #111827 25%, #1f2937 50%, #111827 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite linear;
            border-radius: 8px;
        }
        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
        .hidden-load { display: none; }

        .icon-box {
            background: #00ce9c;
            border-radius: 8px;
            padding: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 15px rgba(0, 206, 156, 0.3);
        }
    </style>
</head>
<body class="min-h-screen pb-10">
    <div class="bg-glow"></div>

    <header class="p-4 flex items-center justify-between sticky top-0 bg-[#0a0f1a] backdrop-blur-md z-50 border-b border-white/5">
        <div class="flex items-center gap-3">
            <div class="icon-box">
                <i data-lucide="trending-up" class="w-5 h-5 text-[#0a0f1a]" style="stroke-width: 3px;"></i>
            </div>
            <h1 class="outfit text-xl font-extrabold tracking-tighter text-white uppercase">UP<span style="color: #00ce9c;">CASH</span></h1>
        </div>
        <button onclick="window.history.back()" class="p-2 bg-white/5 rounded-full hover:bg-white/10 transition-all border border-white/10">
            <i data-lucide="arrow-left" class="w-6 h-6 text-slate-400"></i>
        </button>
    </header>

    <main class="max-w-md mx-auto px-4">
        
        <div id="summary-skeleton" class="mt-6 mb-8">
            <div class="glass-card p-6 rounded-[2rem]">
                <div class="skeleton h-4 w-32 mb-3"></div>
                <div class="skeleton h-10 w-48 mb-2"></div>
                <div class="skeleton h-3 w-40"></div>
            </div>
        </div>

        <div id="summary-real" class="mt-6 mb-8 hidden-load">
            <div class="glass-card p-6 rounded-[2rem] relative overflow-hidden">
                <div class="flex items-center gap-2 mb-2">
                    <i data-lucide="award" class="w-4 h-4 text-[#00ce9c]"></i>
                    <span class="outfit text-xs font-semibold text-slate-400 uppercase tracking-widest">My Affiliate Bonuses</span>
                </div>
                <h2 id="total-bonuses" class="outfit text-3xl font-black text-white">UGX *****</h2>
                <p class="text-[10px] text-slate-500 mt-1 uppercase font-bold tracking-tighter">Total Direct & 1st Indirect commissions</p>
            </div>
        </div>

        <h3 class="outfit text-lg font-bold text-white flex items-center gap-2 mb-4 px-1">
            <i data-lucide="users" class="w-5 h-5 text-[#00ce9c]"></i>
            Referral Network
        </h3>

        <div class="glass-card rounded-3xl overflow-hidden mb-8">
            <div class="overflow-x-auto">
                <table class="w-full text-left text-sm border-collapse">
                    <thead>
                        <tr class="bg-white/5 text-slate-400 text-[10px] uppercase tracking-wider font-bold outfit">
                            <th class="p-4">Username</th>
                            <th class="p-4">Level</th>
                            <th class="p-4 text-right">Bonus</th>
                        </tr>
                    </thead>
                    <tbody id="affiliate-list" class="divide-y divide-white/5">
                        <tr>
                            <td class="p-4"><div class="skeleton h-4 w-24"></div></td>
                            <td class="p-4"><div class="skeleton h-4 w-16"></div></td>
                            <td class="p-4 text-right"><div class="skeleton h-4 w-20 ml-auto"></div></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

    </main>

    <script>
        lucide.createIcons();
        const SUPABASE_URL = 'https://wbodpfbmilhperccgzei.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_CTQy3-UTfBu_U8kl3lWLXQ_7Ki4gukN';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        async function loadAffiliatePage() {
            const { data: { user } } = await supabaseClient.auth.getUser();
            if (!user) {
                window.location.href = 'login.html';
                return;
            }

            // Fetch from transactions
            const { data, error } = await supabaseClient
                .from('transactions')
                .select('amount, description, created_at')
                .eq('userid', user.id)
                .eq('type', 'referral_bonus')
                .order('created_at', { ascending: false });

            const tableBody = document.getElementById('affiliate-list');
            const totalDisplay = document.getElementById('total-bonuses');
            
            document.getElementById('summary-skeleton').classList.add('hidden-load');
            document.getElementById('summary-real').classList.remove('hidden-load');

            if (error || !data || data.length === 0) {
                tableBody.innerHTML = '<tr><td colspan="3" class="p-10 text-center text-slate-500 text-xs tracking-tight outfit font-bold uppercase">No records found.</td></tr>';
                totalDisplay.innerText = "UGX 0";
                return;
            }

            let totalSum = 0;
            let rowsHtml = "";

            data.forEach(tx => {
                let isDirect = tx.description.includes('10%');
                let isIndirect = tx.description.includes('2%');

                // ONLY process Direct and 1st Indirect
                if (isDirect || isIndirect) {
                    totalSum += parseFloat(tx.amount);
                    
                    // Extract username after the colon "10% Direct Commission: boys"
                    const descParts = tx.description.split(': ');
                    const extractedUsername = descParts[1] || 'Member';
                    
                    const levelText = isDirect ? "Direct" : "1st Indirect";
                    const levelClass = isDirect ? "text-[#00ce9c]" : "text-cyan-400";

                    rowsHtml += `
                        <tr class="transition-colors hover:bg-white/5">
                            <td class="p-4">
                                <div class="flex flex-col">
                                    <span class="font-bold text-white tracking-tight outfit">${extractedUsername}</span>
                                    <span class="text-[9px] text-slate-500 font-medium">${new Date(tx.created_at).toLocaleDateString()}</span>
                                </div>
                            </td>
                            <td class="p-4">
                                <span class="px-2 py-0.5 rounded-md bg-white/5 text-[10px] font-bold ${levelClass} border border-white/5">
                                    ${levelText}
                                </span>
                            </td>
                            <td class="p-4 text-right">
                                <span class="font-bold outfit text-white">
                                    UGX ${Number(tx.amount).toLocaleString()}
                                </span>
                            </td>
                        </tr>
                    `;
                }
            });

            tableBody.innerHTML = rowsHtml || '<tr><td colspan="3" class="p-10 text-center text-slate-500 text-xs tracking-tight outfit font-bold uppercase">No Direct or Indirect records found.</td></tr>';
            totalDisplay.innerText = `UGX ${totalSum.toLocaleString()}`;
        }

        window.onload = loadAffiliatePage;
    </script>
</body>
</html>
