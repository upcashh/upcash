<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0a0f1a">
    <title>Affiliates | UPCASH</title>
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            font-family: 'DM Sans', sans-serif;
            background-color: #0a0f1a;
            color: #f8fafc;
        }
        .outfit { font-family: 'Outfit', sans-serif; }

        .bg-glow {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 20% 20%, rgba(0, 206, 156, 0.05) 0%, transparent 50%),
                        radial-gradient(circle at 80% 80%, rgba(0, 206, 156, 0.03) 0%, transparent 50%);
            pointer-events: none;
            z-index: -1;
        }

        .glass-card {
            background: linear-gradient(160deg, #111827 0%, #0d1321 100%); 
            border: 1px solid rgba(0, 206, 156, 0.15);
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }

        .skeleton {
            background: linear-gradient(90deg, #111827 25%, #1f2937 50%, #111827 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite linear;
            border-radius: 8px;
        }
        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
        .hidden-load { display: none; }

        .icon-box {
            background: #00ce9c;
            border-radius: 8px;
            padding: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 15px rgba(0, 206, 156, 0.3);
        }

        /* Tree Styles */
        .tree-line {
            position: absolute;
            left: 19px;
            top: 40px;
            bottom: 0;
            width: 2px;
            background: rgba(0, 206, 156, 0.2);
        }
    </style>
</head>
<body class="min-h-screen pb-10">
    <div class="bg-glow"></div>

    <header class="p-4 flex items-center justify-between sticky top-0 bg-[#0a0f1a] backdrop-blur-md z-50 border-b border-white/5">
        <div class="flex items-center gap-3">
            <div class="icon-box">
                <i data-lucide="trending-up" class="w-5 h-5 text-[#0a0f1a]" style="stroke-width: 3px;"></i>
            </div>
            <h1 class="outfit text-xl font-extrabold tracking-tighter text-white uppercase">UP<span style="color: #00ce9c;">CASH</span></h1>
        </div>
        <button onclick="window.history.back()" class="p-2 bg-white/5 rounded-full hover:bg-white/10 transition-all border border-white/10">
            <i data-lucide="arrow-left" class="w-6 h-6 text-slate-400"></i>
        </button>
    </header>

    <main class="max-w-md mx-auto px-4">
        
        <div id="summary-skeleton" class="mt-6 mb-8">
            <div class="glass-card p-6 rounded-[2rem]"><div class="skeleton h-20 w-full"></div></div>
        </div>

        <div id="summary-real" class="mt-6 mb-8 hidden-load">
            <div class="glass-card p-6 rounded-[2rem] relative overflow-hidden">
                <div class="flex items-center gap-2 mb-2">
                    <i data-lucide="award" class="w-4 h-4 text-[#00ce9c]"></i>
                    <span class="outfit text-xs font-semibold text-slate-400 uppercase tracking-widest">My Affiliate Bonuses</span>
                </div>
                <h2 id="total-bonuses" class="outfit text-3xl font-black text-white">UGX *****</h2>
                <p class="text-[10px] text-slate-500 mt-1 uppercase font-bold tracking-tighter">Total Direct & 1st Indirect commissions</p>
            </div>
        </div>

        <h3 class="outfit text-lg font-bold text-white flex items-center gap-2 mb-4 px-1">
            <i data-lucide="users" class="w-5 h-5 text-[#00ce9c]"></i>
            Affiliate Network
        </h3>

        <div class="glass-card rounded-3xl overflow-hidden mb-8">
            <table class="w-full text-left text-sm border-collapse">
                <thead>
                    <tr class="bg-white/5 text-slate-400 text-[10px] uppercase tracking-wider font-bold outfit">
                        <th class="p-4">Username</th>
                        <th class="p-4">Level</th>
                        <th class="p-4 text-right">Bonus</th>
                    </tr>
                </thead>
                <tbody id="affiliate-list" class="divide-y divide-white/5">
                    </tbody>
            </table>
        </div>

        <h3 class="outfit text-lg font-bold text-white flex items-center gap-2 mb-4 px-1">
            <i data-lucide="network" class="w-5 h-5 text-[#00ce9c]"></i>
            Network Tree
        </h3>
        <div class="glass-card p-6 rounded-3xl relative">
            <div class="flex items-center gap-4 mb-10 relative z-10">
                <div class="w-10 h-10 rounded-full bg-[#00ce9c] flex items-center justify-center border-4 border-[#0a0f1a] shadow-[0_0_15px_rgba(0,206,156,0.4)]">
                    <i data-lucide="user" class="w-5 h-5 text-[#0a0f1a]"></i>
                </div>
                <div><p class="text-[10px] text-[#00ce9c] font-black uppercase tracking-tighter">Root</p><p class="outfit text-white font-bold text-sm">You</p></div>
                <div class="tree-line"></div>
            </div>
            <div class="flex items-center gap-4 mb-10 ml-8 relative z-10">
                <div class="w-8 h-8 rounded-full bg-white/10 flex items-center justify-center border-2 border-[#00ce9c]/30"><i data-lucide="arrow-down-right" class="w-4 h-4 text-[#00ce9c]"></i></div>
                <div><p class="text-[10px] text-slate-500 font-bold uppercase tracking-tighter">Directs</p><p id="tree-l1-count" class="outfit text-white font-bold text-xs">0 Members</p></div>
                <div class="absolute left-[-23px] top-4 w-[23px] h-[2px] bg-[#00ce9c]/20"></div>
            </div>
            <div class="flex items-center gap-4 ml-16 relative z-10">
                <div class="w-8 h-8 rounded-full bg-white/10 flex items-center justify-center border-2 border-cyan-400/30"><i data-lucide="share-2" class="w-4 h-4 text-cyan-400"></i></div>
                <div><p class="text-[10px] text-slate-500 font-bold uppercase tracking-tighter">1st Indirects</p><p id="tree-l2-count" class="outfit text-white font-bold text-xs">0 Members</p></div>
                <div class="absolute left-[-23px] top-4 w-[23px] h-[2px] bg-cyan-400/20"></div>
                <div class="absolute left-[-35px] top-[-40px] w-[2px] h-[45px] bg-[#00ce9c]/20"></div>
            </div>
        </div>

    </main>

    <script>
        lucide.createIcons();
        const SUPABASE_URL = 'https://wbodpfbmilhperccgzei.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_CTQy3-UTfBu_U8kl3lWLXQ_7Ki4gukN';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        async function loadAffiliatePage() {
            const { data: { user } } = await supabaseClient.auth.getUser();
            if (!user) { window.location.href = 'login.html'; return; }

            const { data, error } = await supabaseClient
                .from('transactions')
                .select('amount, description, created_at')
                .eq('userid', user.id)
                .eq('type', 'referral_bonus')
                .order('created_at', { ascending: false });

            document.getElementById('summary-skeleton').style.display = 'none';
            document.getElementById('summary-real').classList.remove('hidden-load');

            const tableBody = document.getElementById('affiliate-list');
            const totalDisplay = document.getElementById('total-bonuses');
            
            if (error || !data || data.length === 0) {
                tableBody.innerHTML = '<tr><td colspan="3" class="p-10 text-center text-slate-600 uppercase text-[10px] font-bold">No referrals found</td></tr>';
                totalDisplay.innerText = "UGX 0";
                return;
            }

            let totalSum = 0;
            let directCount = new Set();
            let indirectCount = new Set();
            let rowsHtml = "";

            data.forEach(tx => {
                const isDirect = tx.description.includes('10%');
                const isIndirect = tx.description.includes('2%');

                if (isDirect || isIndirect) {
                    totalSum += parseFloat(tx.amount);
                    const username = tx.description.split(': ')[1] || 'Member';
                    
                    if (isDirect) directCount.add(username);
                    if (isIndirect) indirectCount.add(username);

                    rowsHtml += `
                        <tr class="hover:bg-white/5">
                            <td class="p-4"><span class="font-bold text-white outfit">${username}</span><br><span class="text-[9px] text-slate-500">${new Date(tx.created_at).toLocaleDateString()}</span></td>
                            <td class="p-4"><span class="px-2 py-0.5 rounded bg-white/5 text-[10px] font-bold ${isDirect ? 'text-[#00ce9c]' : 'text-cyan-400'}">${isDirect ? 'Direct' : '1st Indirect'}</span></td>
                            <td class="p-4 text-right font-bold outfit">UGX ${Number(tx.amount).toLocaleString()}</td>
                        </tr>`;
                }
            });

            tableBody.innerHTML = rowsHtml;
            totalDisplay.innerText = `UGX ${totalSum.toLocaleString()}`;
            document.getElementById('tree-l1-count').innerText = `${directCount.size} Members`;
            document.getElementById('tree-l2-count').innerText = `${indirectCount.size} Members`;
            lucide.createIcons();
        }
        window.onload = loadAffiliatePage;
    </script>
</body>
</html>
