<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>eduLEARN | Premium Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root {
            /* Palette from your reference image */
            --emerald: #022c22;    /* Dark Emerald */
            --gold: #D4AF37;       /* Metallic Gold */
            --neutral: #F5F5F5;    /* Light Grey/White */
            --teal-dark: #134e4a;  /* Deep Contrast Teal */
            --bg: #0B0B0B;         /* Dark Background */
            --card: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        
        body { 
            background: var(--neutral); 
            color: var(--teal-dark); 
            display: flex; 
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* --- Sidebar Navigation --- */
        #sidebar {
            width: 280px;
            background: var(--emerald);
            height: 100vh;
            position: fixed;
            left: 0;
            top: 0;
            z-index: 2000;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            box-shadow: 5px 0 25px rgba(0,0,0,0.2);
        }

        /* Responsive Hidden State */
        @media (max-width: 768px) {
            #sidebar { transform: translateX(-100%); }
            #sidebar.open { transform: translateX(0); }
            main { margin-left: 0 !important; }
        }

        .logo {
            font-size: 24px;
            font-weight: 700;
            color: var(--gold);
            margin-bottom: 40px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .nav-link {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 14px 18px;
            text-decoration: none;
            color: rgba(255,255,255,0.7);
            border-radius: 12px;
            margin-bottom: 8px;
            transition: 0.3s;
        }

        .nav-link:hover, .nav-link.active {
            background: rgba(212, 175, 55, 0.15);
            color: var(--gold);
        }

        /* --- Main Content Area --- */
        main {
            flex: 1;
            margin-left: 280px;
            padding: 30px;
            transition: 0.3s;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .menu-trigger {
            display: none;
            cursor: pointer;
            background: var(--emerald);
            padding: 10px;
            border-radius: 8px;
            color: var(--gold);
        }

        @media (max-width: 768px) { .menu-trigger { display: block; } }

        /* --- UI Components --- */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: var(--card);
            padding: 20px;
            border-radius: 20px;
            border-left: 5px solid var(--gold);
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .stat-card h3 { font-size: 13px; color: #64748b; text-transform: uppercase; letter-spacing: 1px; }
        .stat-card p { font-size: 24px; font-weight: 700; color: var(--emerald); margin-top: 5px; }

        .upload-section {
            background: var(--card);
            padding: 30px;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 14px; }
        
        input, select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #eef2f6;
            border-radius: 12px;
            outline: none;
            font-family: inherit;
        }

        input:focus { border-color: var(--gold); }

        .btn-primary {
            background: var(--emerald);
            color: var(--gold);
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 14px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            transition: 0.3s;
        }

        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(2, 44, 34, 0.3); }

        /* --- SVG Animations --- */
        @keyframes spin-slow {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .animate-spin { animation: spin-slow 8s linear infinite; }

        .overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            display: none;
            z-index: 1999;
        }
    </style>
</head>
<body>

<div class="overlay" id="overlay" onclick="toggleMenu()"></div>

<nav id="sidebar">
    <div class="logo">
        <svg class="animate-spin" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/></svg>
        eduLEARN
    </div>
    
    <a href="index.html" class="nav-link">
        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
        View Website
    </a>
    
    <a href="#" class="nav-link active">
        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path></svg>
        Upload Papers
    </a>
</nav>

<main>
    <header>
        <div class="menu-trigger" onclick="toggleMenu()">
            <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h16"></path></svg>
        </div>
        <h1 style="font-weight: 600;">Admin Portal</h1>
        <div style="color: var(--emerald); font-weight: 600;">Welcome, Admin</div>
    </header>

    <div class="stats-grid">
        <div class="stat-card">
            <h3>Total Files</h3>
            <p id="countFiles">...</p>
        </div>
        <div class="stat-card">
            <h3>Active Bucket</h3>
            <p>PDFs</p>
        </div>
    </div>

    <div class="upload-section">
        <h2 style="margin-bottom: 25px; color: var(--emerald);">Add New Resource</h2>
        
        <div class="form-group">
            <label>Paper Title (e.g., Biology P1 2024)</label>
            <input type="text" id="paperTitle" placeholder="Enter name...">
        </div>

        <div class="form-group">
            <label>Education Level</label>
            <select id="paperLevel">
                <option value="S.1">S.1</option>
                <option value="S.2">S.2</option>
                <option value="S.3">S.3</option>
                <option value="S.4 UCE">S.4 UCE</option>
                <option value="S.5">S.5</option>
                <option value="S.6 UACE">S.6 UACE</option>
            </select>
        </div>

        <div class="form-group">
            <label>Select PDF File</label>
            <input type="file" id="fileInput" accept="application/pdf">
        </div>

        <button class="btn-primary" onclick="handleUpload()" id="uploadBtn">
            <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path></svg>
            Upload to eduLEARN
        </button>

        <p id="statusMsg" style="margin-top: 15px; text-align: center; font-size: 14px; font-weight: 600;"></p>
    </div>
</main>

<script>
    // Supabase Configuration
    const SUPABASE_URL = 'https://likqwrfnubvkxgyjqhut.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_JYgameVyM3Tt4ncbJlxcSQ_cfmErrdl'; 
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // Toggle Menu Function (Now bulletproof)
    function toggleMenu() {
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('overlay');
        sidebar.classList.toggle('open');
        overlay.style.display = sidebar.classList.contains('open') ? 'block' : 'none';
    }

    async function handleUpload() {
        const file = document.getElementById('fileInput').files[0];
        const title = document.getElementById('paperTitle').value;
        const level = document.getElementById('paperLevel').value;
        const btn = document.getElementById('uploadBtn');
        const status = document.getElementById('statusMsg');

        if (!file || !title) {
            status.innerText = "❌ Please fill all fields";
            status.style.color = "red";
            return;
        }

        btn.disabled = true;
        btn.innerText = "Uploading...";
        status.innerText = "Processing file...";

        try {
            // 1. Upload to Storage
            const fileName = `${Date.now()}_${file.name}`;
            const { data: storageData, error: storageError } = await _supabase.storage
                .from('pdfs')
                .upload(fileName, file);

            if (storageError) throw storageError;

            // 2. Get Public URL
            const { data: { publicUrl } } = _supabase.storage.from('pdfs').getPublicUrl(fileName);

            // 3. Save to Database
            const { error: dbError } = await _supabase.from('papers').insert([{
                name: title,
                level: level,
                file_url: publicUrl
            }]);

            if (dbError) throw dbError;

            status.innerText = "✅ Successfully added to Library!";
            status.style.color = "green";
            document.getElementById('paperTitle').value = "";
        } catch (err) {
            console.error(err);
            status.innerText = `❌ Error: ${err.message}`;
            status.style.color = "red";
        } finally {
            btn.disabled = false;
            btn.innerText = "Upload to eduLEARN";
        }
    }
</script>
</body>
            </html>
