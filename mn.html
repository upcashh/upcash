<!doctype html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0a0f1a">
    <title>UPCASH | Create Account</title>
    
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body { background-color: #0a0f1a; font-family: 'DM Sans', sans-serif; }
        .outfit { font-family: 'Outfit', sans-serif; }
        
        .icon-box {
            background: #00ce9c;
            border-radius: 12px;
            padding: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 20px rgba(0, 206, 156, 0.4);
        }

        .glass-card { 
            background: linear-gradient(160deg, #111827 0%, #0d1321 100%); 
            border: 1px solid rgba(0, 206, 156, 0.15);
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }
        
        .input-container { position: relative; }

        .field { 
            width: 100%; 
            padding: 1rem 3rem 1rem 3rem; 
            border-radius: 0.75rem; 
            background: rgba(10, 15, 26, 0.5); 
            border: 1px solid rgba(255,255,255,0.08); 
            color: white; 
            outline: none; 
            transition: all 0.3s ease; 
        }

        .floating-label {
            position: absolute;
            left: 3rem;
            top: 50%;
            transform: translateY(-50%);
            background: #101624; 
            padding: 0 6px;
            color: #5a6477;
            font-size: 0.875rem;
            pointer-events: none;
            transition: all 0.2s ease;
        }

        .field:focus + .floating-label,
        .field:not(:placeholder-shown) + .floating-label {
            top: 0;
            font-size: 0.75rem;
            color: #00CE9C;
            transform: translateY(-50%) scale(0.9);
        }

        .field:focus { border-color: #00CE9C; box-shadow: 0 0 10px rgba(0, 206, 156, 0.1); }
        .input-icon { position: absolute; left: 1rem; top: 1.1rem; color: #00CE9C; opacity: 0.7; z-index: 10; }
        
        .toggle-btn { position: absolute; right: 1rem; top: 1.1rem; color: #5a6477; cursor: pointer; z-index: 10; transition: color 0.3s; }
        .toggle-btn:hover { color: #00CE9C; }

        .btn-primary {
            background: #00CE9C;
            color: #0a0f1a;
            box-shadow: 0 10px 20px rgba(0,206,156,0.2);
            transition: all 0.3s ease;
        }
        .btn-primary:hover:not(:disabled) { transform: translateY(-2px); }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

        .input-error { border-color: #ef4444 !important; }
        .input-success { border-color: #00CE9C !important; }

        @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .fade-up { animation: fadeUp 0.6s ease forwards; }

        /* Animated Icons */
        .lucide { animation: iconFloat 3s ease-in-out infinite; }
        @keyframes iconFloat { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-3px); } }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 sm:p-8">
    
    <div style="position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;overflow:hidden;z-index:0;">
        <div style="position:absolute;top:-20%;right:-15%;width:500px;height:500px;border-radius:50%;background:radial-gradient(circle,rgba(0,206,156,0.08) 0%,transparent 70%);"></div>
        <div style="position:absolute;bottom:-10%;left:-10%;width:400px;height:400px;border-radius:50%;background:radial-gradient(circle,rgba(0,206,156,0.05) 0%,transparent 70%);"></div>
    </div>

    <div class="relative z-10 w-full max-w-lg fade-up">
        <header class="text-center mb-8">
            <div class="flex items-center justify-center gap-4 mb-2">
               <div class="icon-box">
                 <i data-lucide="trending-up" style="width: 32px; height: 32px; color: #0a0f1a; stroke-width: 3px;"></i>
               </div>
               <h1 class="outfit font-900 text-5xl sm:text-6xl tracking-tighter text-white uppercase">UP<span style="color:#00ce9c;">CASH</span></h1>
            </div>
            <p class="outfit font-bold text-xs text-white/80 tracking-[2px] uppercase">Secure Wealth Infrastructure</p>
            <p class="text-[10px] text-slate-500 mt-1 px-10">Join a transparent ecosystem built on algorithmic precision and capital insulation.</p>
        </header>

        <div class="glass-card rounded-3xl p-6 sm:p-10">
            <form id="signupForm" class="grid grid-cols-1 sm:grid-cols-2 gap-x-4 gap-y-6">
                <div class="input-container sm:col-span-2">
                    <i data-lucide="user" class="input-icon w-5 h-5"></i>
                    <input type="text" id="username" required placeholder=" " class="field">
                    <label class="floating-label">Username</label>
                    <div id="username-feedback" class="text-[10px] absolute -bottom-5 left-2 text-slate-500">Lowercase letters only.</div>
                </div>

                <div class="input-container">
                    <i data-lucide="mail" class="input-icon w-5 h-5"></i>
                    <input type="email" id="email" required placeholder=" " class="field">
                    <label class="floating-label">Email Address</label>
                </div>

                <div class="input-container">
                    <i data-lucide="phone" class="input-icon w-5 h-5"></i>
                    <input type="tel" id="phone" required placeholder=" " class="field">
                    <label class="floating-label">Phone Number</label>
                </div>

                <div class="input-container">
                    <i data-lucide="lock" class="input-icon w-5 h-5"></i>
                    <input type="password" id="password" required placeholder=" " class="field">
                    <label class="floating-label">Password</label>
                    <div class="toggle-btn" onclick="togglePass('password', this)">
                        <i data-lucide="eye" class="w-4 h-4"></i>
                    </div>
                </div>

                <div class="input-container">
                    <i data-lucide="shield-check" class="input-icon w-5 h-5"></i>
                    <input type="password" id="confirmPassword" required placeholder=" " class="field">
                    <label class="floating-label">Confirm Password</label>
                    <div class="toggle-btn" onclick="togglePass('confirmPassword', this)">
                        <i data-lucide="eye" class="w-4 h-4"></i>
                    </div>
                    <div id="pass-feedback" class="text-[10px] absolute -bottom-5 left-2 text-slate-500 italic">Min. 8 characters required.</div>
                </div>

                <input type="hidden" id="referrerInput" name="referred_by" value="">

                <button type="submit" id="submitBtn" disabled class="btn-primary sm:col-span-2 w-full py-4 rounded-xl outfit font-bold text-lg mt-4">Register Now</button>
            </form>
            <div class="mt-10 text-center pt-4 border-t border-white/5">
                <p class="text-slate-500 text-sm">Already a member? <a href="signin.html" class="text-[#00CE9C] font-bold hover:underline">Sign In</a></p>
            </div>
        </div>
    </div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    lucide.createIcons();
    const supabaseClient = supabase.createClient('https://wbodpfbmilhperccgzei.supabase.co', 'sb_publishable_CTQy3-UTfBu_U8kl3lWLXQ_7Ki4gukN');

    document.addEventListener("DOMContentLoaded", () => {
        const urlParams = new URLSearchParams(window.location.search);
        let referrer = urlParams.get('ref') || localStorage.getItem('affiliate_user');
        if (referrer) document.getElementById('referrerInput').value = referrer;
    });

    const form = document.getElementById('signupForm'), 
          usernameInput = document.getElementById('username'), 
          feedback = document.getElementById('username-feedback'), 
          pass1 = document.getElementById('password'), 
          pass2 = document.getElementById('confirmPassword'), 
          passFeed = document.getElementById('pass-feedback'), 
          submitBtn = document.getElementById('submitBtn');
    
    function togglePass(id, btn) {
        const input = document.getElementById(id);
        const icon = btn.querySelector('i');
        if (input.type === 'password') {
            input.type = 'text';
            icon.setAttribute('data-lucide', 'eye-off');
        } else {
            input.type = 'password';
            icon.setAttribute('data-lucide', 'eye');
        }
        lucide.createIcons();
    }

    function validateForm() {
        const isUserValid = usernameInput.classList.contains('input-success');
        const passValue = pass1.value;
        const confirmValue = pass2.value;
        
        const isLongEnough = passValue.length >= 8;
        const isMatch = passValue !== "" && passValue === confirmValue;

        // Visual feedback for password rule
        if (passValue.length > 0 && !isLongEnough) {
            pass1.classList.add('input-error');
            passFeed.innerText = "Password too short (Minimum 8 characters)";
            passFeed.style.color = "#ef4444";
        } else if (confirmValue.length > 0 && !isMatch) {
            pass1.classList.remove('input-error');
            pass2.classList.add('input-error');
            passFeed.innerText = "Passwords do not match";
            passFeed.style.color = "#ef4444";
        } else if (isLongEnough && isMatch) {
            pass1.classList.remove('input-error');
            pass2.classList.remove('input-error');
            pass1.classList.add('input-success');
            pass2.classList.add('input-success');
            passFeed.innerText = "Security criteria met";
            passFeed.style.color = "#00CE9C";
        } else {
            pass1.classList.remove('input-error', 'input-success');
            pass2.classList.remove('input-error', 'input-success');
        }

        submitBtn.disabled = !(isUserValid && isLongEnough && isMatch);
    }

    usernameInput.addEventListener('input', (e) => {
        const sanitized = e.target.value.toLowerCase().replace(/[^a-z]/g, '');
        if (e.target.value !== sanitized) usernameInput.value = sanitized;
        if (sanitized.length < 4) {
            feedback.innerText = "Minimum 4 lowercase letters.";
            usernameInput.classList.remove('input-success', 'input-error');
            validateForm(); return;
        }
        feedback.innerText = "Checking...";
        clearTimeout(window.timer);
        window.timer = setTimeout(async () => {
            const { data } = await supabaseClient.from('userinfo').select('username').eq('username', sanitized).maybeSingle();
            if (data) { 
                feedback.innerText = "Username taken."; 
                feedback.style.color = "#ef4444";
                usernameInput.classList.add('input-error'); 
                usernameInput.classList.remove('input-success'); 
            } else { 
                feedback.innerText = "Username available"; 
                feedback.style.color = "#00CE9C";
                usernameInput.classList.remove('input-error'); 
                usernameInput.classList.add('input-success'); 
            }
            validateForm();
        }, 500);
    });

    [pass1, pass2].forEach(el => el.addEventListener('input', validateForm));

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        submitBtn.innerText = "Verifying Referrer...";
        submitBtn.disabled = true;

        let referrerUUID = null;
        const referrerUsername = document.getElementById('referrerInput').value;

        if (referrerUsername) {
            const { data: refData } = await supabaseClient
                .from('userinfo')
                .select('userid')
                .eq('username', referrerUsername)
                .single();
            if (refData) referrerUUID = refData.userid;
        }

        submitBtn.innerText = "Creating Account...";
        const { error } = await supabaseClient.auth.signUp({ 
            email: document.getElementById('email').value, 
            password: pass1.value, 
            options: { 
                data: { 
                    username: usernameInput.value, 
                    telephone: document.getElementById('phone').value,
                    referred_by: referrerUUID 
                } 
            } 
        });

        if(error) { 
            alert(error.message); 
            submitBtn.innerText = "Register Now"; 
            submitBtn.disabled = false;
        } else { 
            localStorage.removeItem('affiliate_user');
            window.location.href = "verify.html"; 
        }
    });
</script>
</body>
</html>
