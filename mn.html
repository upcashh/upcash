<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0a0f1a">
    <title>Affiliates | UPCASH</title>
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            font-family: 'DM Sans', sans-serif;
            background-color: #0a0f1a;
            color: #f8fafc;
        }
        .outfit { font-family: 'Outfit', sans-serif; }

        .bg-glow {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 20% 20%, rgba(0, 206, 156, 0.05) 0%, transparent 50%),
                        radial-gradient(circle at 80% 80%, rgba(0, 206, 156, 0.03) 0%, transparent 50%);
            pointer-events: none;
            z-index: -1;
        }

        .glass-card {
            background: linear-gradient(160deg, #111827 0%, #0d1321 100%); 
            border: 1px solid rgba(0, 206, 156, 0.15);
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }

        .icon-box {
            background: #00ce9c;
            border-radius: 8px;
            padding: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 15px rgba(0, 206, 156, 0.3);
        }

        /* Tree Styling */
        .tree-container { position: relative; padding-left: 20px; }
        .tree-branch {
            position: relative;
            padding-left: 30px;
            margin-bottom: 15px;
            border-left: 2px solid rgba(0, 206, 156, 0.2);
        }
        .tree-branch::before {
            content: "";
            position: absolute;
            left: 0;
            top: 15px;
            width: 20px;
            height: 2px;
            background: rgba(0, 206, 156, 0.2);
        }
        .user-tag {
            display: inline-block;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 4px 10px;
            border-radius: 8px;
            font-size: 11px;
            margin: 3px;
            color: #cbd5e1;
        }
    </style>
</head>
<body class="min-h-screen pb-10">
    <div class="bg-glow"></div>

    <header class="p-4 flex items-center justify-between sticky top-0 bg-[#0a0f1a] backdrop-blur-md z-50 border-b border-white/5">
        <div class="flex items-center gap-3">
            <div class="icon-box"><i data-lucide="trending-up" class="w-5 h-5 text-[#0a0f1a]" style="stroke-width: 3px;"></i></div>
            <h1 class="outfit text-xl font-extrabold tracking-tighter text-white uppercase">UP<span style="color: #00ce9c;">CASH</span></h1>
        </div>
        <button onclick="window.history.back()" class="p-2 bg-white/5 rounded-full border border-white/10">
            <i data-lucide="arrow-left" class="w-6 h-6 text-slate-400"></i>
        </button>
    </header>

    <main class="max-w-md mx-auto px-4 mt-6">
        
        <div class="glass-card p-6 rounded-[2rem] relative overflow-hidden mb-8">
            <div class="flex items-center gap-2 mb-2">
                <i data-lucide="award" class="w-4 h-4 text-[#00ce9c]"></i>
                <span class="outfit text-xs font-semibold text-slate-400 uppercase tracking-widest">Affiliate Earnings</span>
            </div>
            <h2 id="total-bonuses" class="outfit text-3xl font-black text-white">UGX 0</h2>
        </div>

        <h3 class="outfit text-lg font-bold text-white flex items-center gap-2 mb-4 px-1">
            <i data-lucide="network" class="w-5 h-5 text-[#00ce9c]"></i>
            Downline Tree
        </h3>

        <div class="glass-card p-6 rounded-3xl mb-8">
            <div class="flex items-center gap-3 mb-6">
                <div class="w-10 h-10 rounded-full bg-[#00ce9c] flex items-center justify-center border-4 border-[#0a0f1a] shadow-[0_0_15px_rgba(0,206,156,0.3)]">
                    <i data-lucide="user" class="w-5 h-5 text-[#0a0f1a]"></i>
                </div>
                <div>
                    <p class="text-[10px] text-[#00ce9c] font-black uppercase tracking-tighter">My Account</p>
                    <p class="outfit text-white font-bold text-sm">Main Partner</p>
                </div>
            </div>

            <div class="tree-container">
                <div class="tree-branch">
                    <div class="flex items-center gap-2 mb-2">
                        <span class="text-[10px] font-black text-[#00ce9c] uppercase bg-[#00ce9c]/10 px-2 py-0.5 rounded">Level 1 (Direct)</span>
                    </div>
                    <div id="l1-usernames" class="flex flex-wrap gap-1 min-h-[20px]">
                        <span class="text-slate-600 text-[10px] italic">No directs found...</span>
                    </div>
                </div>

                <div class="tree-branch" style="border-left-color: rgba(34, 211, 238, 0.2);">
                    <div class="flex items-center gap-2 mb-2">
                        <span class="text-[10px] font-black text-cyan-400 uppercase bg-cyan-400/10 px-2 py-0.5 rounded">Level 2 (Indirect)</span>
                    </div>
                    <div id="l2-usernames" class="flex flex-wrap gap-1 min-h-[20px]">
                        <span class="text-slate-600 text-[10px] italic">No indirects found...</span>
                    </div>
                </div>
            </div>
        </div>

        <h3 class="outfit text-lg font-bold text-white flex items-center gap-2 mb-4 px-1">
            <i data-lucide="list" class="w-5 h-5 text-[#00ce9c]"></i>
            Recent Payouts
        </h3>
        <div class="glass-card rounded-3xl overflow-hidden">
            <table class="w-full text-left text-sm">
                <tbody id="affiliate-list" class="divide-y divide-white/5">
                    </tbody>
            </table>
        </div>

    </main>

    <script>
        lucide.createIcons();
        const SUPABASE_URL = 'https://wbodpfbmilhperccgzei.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_CTQy3-UTfBu_U8kl3lWLXQ_7Ki4gukN';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        async function loadAffiliates() {
            const { data: { user } } = await supabaseClient.auth.getUser();
            if (!user) return window.location.href = 'login.html';

            const { data, error } = await supabaseClient
                .from('transactions')
                .select('amount, description, created_at')
                .eq('userid', user.id)
                .eq('type', 'referral_bonus')
                .order('created_at', { ascending: false });

            if (error || !data) return;

            const l1Container = document.getElementById('l1-usernames');
            const l2Container = document.getElementById('l2-usernames');
            const tableBody = document.getElementById('affiliate-list');
            const totalDisplay = document.getElementById('total-bonuses');

            let totalSum = 0;
            let l1Set = new Set();
            let l2Set = new Set();
            let rowsHtml = "";

            data.forEach(tx => {
                const isDirect = tx.description.includes('10%');
                const isIndirect = tx.description.includes('2%');

                if (isDirect || isIndirect) {
                    totalSum += parseFloat(tx.amount);
                    const username = tx.description.split(': ')[1] || 'Member';
                    
                    if (isDirect) l1Set.add(username);
                    if (isIndirect) l2Set.add(username);

                    rowsHtml += `
                        <tr class="hover:bg-white/5">
                            <td class="p-4">
                                <span class="font-bold text-white outfit text-xs">${username}</span>
                                <p class="text-[9px] text-slate-500">${new Date(tx.created_at).toLocaleDateString()}</p>
                            </td>
                            <td class="p-4 text-right">
                                <span class="text-[10px] font-bold ${isDirect ? 'text-[#00ce9c]' : 'text-cyan-400'}">UGX ${Number(tx.amount).toLocaleString()}</span>
                            </td>
                        </tr>`;
                }
            });

            // Update Total
            totalDisplay.innerText = `UGX ${totalSum.toLocaleString()}`;

            // Generate L1 User Tags
            if (l1Set.size > 0) {
                l1Container.innerHTML = Array.from(l1Set).map(name => `<span class="user-tag font-bold">@${name}</span>`).join('');
            }

            // Generate L2 User Tags
            if (l2Set.size > 0) {
                l2Container.innerHTML = Array.from(l2Set).map(name => `<span class="user-tag font-bold" style="border-color: rgba(34, 211, 238, 0.2);">@${name}</span>`).join('');
            }

            tableBody.innerHTML = rowsHtml || '<tr><td class="p-6 text-center text-slate-500 text-xs">No transactions.</td></tr>';
            lucide.createIcons();
        }

        window.onload = loadAffiliates;
    </script>
</body>
</html>
