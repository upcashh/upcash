<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UPCASH | Create Account</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%); 
            min-height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            padding: 20px; 
            -webkit-font-smoothing: antialiased;
        }
        .glass-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); width: 100%; max-width: 400px; padding: 2rem; border-radius: 2rem; }
        .input-group { position: relative; margin-bottom: 1rem; }
        .input-icon { position: absolute; left: 1rem; top: 1rem; color: #64748b; }
        .field { width: 100%; padding: 0.75rem 0.75rem 0.75rem 3rem; border-radius: 0.75rem; background: rgba(15, 23, 42, 0.5); border: 1px solid #334155; color: white; outline: none; transition: all 0.3s; }
        .field:focus { border-color: #3b82f6; }
        .status-msg { font-size: 0.75rem; margin-top: 0.25rem; height: 1.2rem; }
        .input-error { border-color: #ef4444 !important; }
        .input-success { border-color: #22c55e !important; }
    </style>
</head>
<body>

<div class="glass-card shadow-2xl">
    <div class="text-center mb-8">
        <div class="flex items-center justify-center gap-2 mb-4">
            <div class="bg-blue-600 p-2 rounded-lg">
                <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"></path></svg>
            </div>
            <h1 class="text-xl font-bold text-white tracking-wider">UP<span class="text-blue-500">CASH</span></h1>
        </div>
        <h2 class="text-lg font-semibold text-white">Welcome to our Business Platform</h2>
        <p class="text-sm text-slate-400 mt-1">Automated instant withdraws and deposits.</p>
    </div>

    <form id="signupForm" class="space-y-4">
        <div class="input-group">
            <svg class="w-5 h-5 input-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
            <input type="text" id="username" required placeholder="Username" class="field">
            <div id="username-feedback" class="status-msg text-slate-400">Lowercase letters only.</div>
        </div>

        <div class="input-group">
            <svg class="w-5 h-5 input-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
            <input type="email" id="email" required placeholder="Email Address" class="field">
        </div>

        <div class="input-group">
            <svg class="w-5 h-5 input-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"></path></svg>
            <input type="tel" id="phone" required placeholder="Phone Number" class="field">
        </div>

        <div class="input-group">
            <svg class="w-5 h-5 input-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
            <input type="password" id="password" required placeholder="Create Password" class="field">
        </div>

        <div class="input-group">
            <svg class="w-5 h-5 input-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path></svg>
            <input type="password" id="confirmPassword" required placeholder="Confirm Password" class="field">
            <div id="pass-feedback" class="status-msg text-red-500"></div>
        </div>

        <button type="submit" id="submitBtn" disabled class="w-full py-4 rounded-xl bg-gradient-to-r from-blue-600 to-indigo-600 text-white font-bold transition opacity-50 cursor-not-allowed">Register Now</button>
    </form>

    <div class="mt-6 text-center space-y-3">
        <a href="#" class="text-sm text-slate-400 hover:text-blue-400 transition">Forgot password?</a>
        <p class="text-sm text-slate-500">Already have an account? <a href="signin.html" class="text-blue-500 font-bold hover:underline">Sign In</a></p>
    </div>

    <div class="mt-8 pt-6 border-t border-slate-800 text-center">
        <p class="text-slate-600 text-xs mb-3">© UPCASH Business Platform 2026</p>
        <a href="mailto:support@upcash.com" class="inline-flex items-center gap-2 bg-slate-800 px-4 py-2 rounded-lg text-slate-300 hover:text-blue-400 transition">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
            <span class="text-xs">Email Support</span>
        </a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    const supabaseClient = supabase.createClient('https://wbodpfbmilhperccgzei.supabase.co', 'sb_publishable_CTQy3-UTfBu_U8kl3lWLXQ_7Ki4gukN');
    const form = document.getElementById('signupForm'), usernameInput = document.getElementById('username'), feedback = document.getElementById('username-feedback'), pass1 = document.getElementById('password'), pass2 = document.getElementById('confirmPassword'), passFeed = document.getElementById('pass-feedback'), submitBtn = document.getElementById('submitBtn');
    
    function validateForm() {
        const isUserValid = usernameInput.classList.contains('input-success');
        const isPassMatch = pass1.value !== "" && pass1.value === pass2.value;
        submitBtn.disabled = !(isUserValid && isPassMatch);
        submitBtn.style.opacity = submitBtn.disabled ? "0.5" : "1";
        submitBtn.style.cursor = submitBtn.disabled ? "not-allowed" : "pointer";
    }

    usernameInput.addEventListener('input', (e) => {
        const sanitized = e.target.value.toLowerCase().replace(/[^a-z]/g, '');
        if (e.target.value !== sanitized) usernameInput.value = sanitized;
        
        if (sanitized.length < 4) {
            feedback.innerText = "Minimum 4 lowercase letters.";
            usernameInput.classList.remove('input-success', 'input-error');
            validateForm(); return;
        }

        feedback.innerText = "Checking availability...";
        clearTimeout(window.timer);
        window.timer = setTimeout(async () => {
            const { data } = await supabaseClient.from('userinfo').select('username').eq('username', sanitized).maybeSingle();
            if (data) { feedback.innerText = "Username taken."; usernameInput.classList.add('input-error'); usernameInput.classList.remove('input-success'); }
            else { feedback.innerText = "Username available"; usernameInput.classList.remove('input-error'); usernameInput.classList.add('input-success'); }
            validateForm();
        }, 500);
    });

    [pass1, pass2].forEach(el => el.addEventListener('input', () => {
        passFeed.innerText = (pass2.value && pass1.value !== pass2.value) ? "Passwords do not match" : "";
        validateForm();
    }));

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        submitBtn.innerText = "Registering...";
        const { error } = await supabaseClient.auth.signUp({ email: document.getElementById('email').value, password: pass1.value, options: { data: { username: usernameInput.value, telephone: document.getElementById('phone').value } } });
        if(error) { alert(error.message); submitBtn.innerText = "Register Now"; } 
        else { alert("Success! Please verify your email."); form.reset(); }
    });
</script>
</body>
</html>
