<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UPCASH | Professional Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Base Dark Theme (Default) */
        :root {
            --bg-gradient: radial-gradient(circle at top left, #1e293b, #0f172a);
            --text-main: #e2e8f0;
            --text-muted: #94a3b8;
            --card-bg: rgba(255, 255, 255, 0.03);
            --card-border: rgba(255, 255, 255, 0.1);
            --header-bg: rgba(15, 23, 42, 0.5);
            --ripple-color: rgba(255, 255, 255, 0.3);
        }

        /* Professional Light Theme (Slate & Cobalt) */
        body.light-theme {
            --bg-gradient: linear-gradient(to bottom, #f8fafc, #f1f5f9);
            --text-main: #0f172a;
            --text-muted: #64748b;
            --card-bg: #ffffff;
            --card-border: #e2e8f0;
            --header-bg: rgba(255, 255, 255, 0.8);
            --ripple-color: rgba(0, 0, 0, 0.1);
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg-gradient); 
            min-height: 100vh; 
            color: var(--text-main); 
            transition: background 0.3s ease, color 0.3s ease;
            -webkit-font-smoothing: antialiased;
        }

        .glass-card { 
            background: var(--card-bg); 
            backdrop-filter: blur(12px); 
            border: 1px solid var(--card-border); 
            transition: all 0.3s ease;
        }

        .light-theme .glass-card {
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
        }

        .btn-gradient { background: linear-gradient(135deg, #3b82f6, #2563eb); border: none; color: white; }
        .text-gradient { background: linear-gradient(90deg, #60a5fa, #a855f7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .ripple-btn { position: relative; overflow: hidden; transition: transform 0.2s; }
        .ripple-btn:active { transform: scale(0.96); }

        .ripple {
            position: absolute;
            background: var(--ripple-color);
            border-radius: 50%;
            transform: scale(0);
            animation: ripple-animation 0.6s linear;
            pointer-events: none;
        }
        @keyframes ripple-animation { to { transform: scale(4); opacity: 0; } }

        .plan-row { transition: all 0.3s ease; cursor: pointer; position: relative; overflow: hidden; }
        .plan-row:hover { background: var(--card-border) !important; }

        .skeleton { background: var(--card-border); overflow: hidden; position: relative; }
    </style>
</head>
<body class="pb-20">

    <header class="flex items-center justify-between p-5 sticky top-0 bg-[var(--header-bg)] backdrop-blur-md z-50 border-b border-black/5">
        <div class="flex items-center gap-2">
            <div class="bg-blue-600 p-2 rounded-lg">
                <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"></path></svg>
            </div>
            <h1 class="text-xl font-bold tracking-tight">UP<span class="text-blue-500">CASH</span></h1>
        </div>
        <div class="flex items-center gap-2">
            <button onclick="toggleTheme()" class="ripple-btn p-2 hover:bg-slate-500/10 rounded-full transition-colors" id="theme-toggle">
                <svg id="theme-icon" class="w-6 h-6 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707M17.657 17.657l-.707-.707M6.343 6.343l-.707-.707M12 8a4 4 0 100 8 4 4 0 000-8z"></path>
                </svg>
            </button>
            <button onclick="handleLogout()" class="ripple-btn p-2 hover:bg-red-500/10 rounded-full transition-colors">
                <svg class="w-5 h-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
            </button>
            <a href="profile.html">
                <button class="ripple-btn p-2 hover:bg-slate-500/10 rounded-full">
                    <svg class="w-6 h-6 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5.121 17.804A13.937 13.937 0 0112 16c2.5 0 4.847.655 6.879 1.804M15 10a3 3 0 11-6 0 3 3 0 016 0zm6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                </button>
            </a>
        </div>
    </header>

    <div id="dashboard-content" class="p-4 max-w-lg mx-auto space-y-6">
        <div class="flex items-center justify-between w-full px-1">
            <p class="text-slate-500 text-sm font-medium">Welcome back, <span class="text-gradient font-bold" id="username">User</span></p>
            <span class="bg-emerald-500/10 border border-emerald-500/20 text-emerald-500 text-[10px] font-bold px-2 py-0.5 rounded-full uppercase">Verified</span>
        </div>

        <div class="rounded-3xl p-6 shadow-2xl relative overflow-hidden text-white" style="background: linear-gradient(135deg, #2563eb, #7c3aed);">
            <div class="flex justify-between items-start mb-1">
                <p class="text-blue-100/80 text-sm font-medium">Available Balance</p>
                <button onclick="toggleBalance()" class="text-blue-100/60 hover:text-white"><svg id="eyeIcon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path></svg></button>
            </div>
            <h3 class="text-4xl font-black mb-6">UGX <span id="balance">50,000</span></h3>
            <div class="grid grid-cols-2 gap-4">
                <div class="bg-white/10 rounded-2xl p-3 border border-white/5">
                    <p class="text-[10px] text-blue-100/60 uppercase">Total Investment</p>
                    <p class="font-bold text-lg">UGX 100,000</p>
                </div>
                <div class="bg-white/10 rounded-2xl p-3 border border-white/5">
                    <p class="text-[10px] text-blue-100/60 uppercase">Total Withdrawn</p>
                    <p class="font-bold text-lg">UGX 25,000</p>
                </div>
            </div>
        </div>

        <div class="flex gap-4">
            <a href="transactions.html" class="flex-1"> 
                <button class="ripple-btn btn-gradient w-full h-14 font-bold rounded-xl flex items-center justify-center gap-2 text-sm shadow-lg shadow-blue-500/20">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01m-.01 4h.01"></path></svg> Transactions
                </button>
            </a>
            <a href="withdraw.html" class="flex-1"> 
                <button class="ripple-btn glass-card w-full h-14 font-bold rounded-xl flex items-center justify-center gap-2 text-sm">
                    <svg class="w-4 h-4 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8l4-4m0 0l4 4m-4-4v12m-4 0h8"></path></svg> Withdraw
                </button> 
            </a>
        </div>

        <div class="space-y-3">
            <h4 class="text-lg font-bold text-gradient">Investment Plans</h4>
            <div class="glass-card rounded-2xl overflow-hidden">
                <table class="w-full text-left text-sm">
                    <thead class="bg-slate-500/5 text-slate-400 text-[10px] uppercase">
                        <tr><th class="p-4">Plan</th><th class="p-4 text-center">ROI</th><th class="p-4 text-right">Min</th></tr>
                    </thead>
                    <tbody class="divide-y divide-black/5">
                        <tr class="plan-row"><td class="p-4 font-bold text-blue-500">Basic</td><td class="p-4 text-center">8%</td><td class="p-4 text-right">10,000</td></tr>
                        <tr class="plan-row"><td class="p-4 font-bold text-purple-500">Silver</td><td class="p-4 text-center">10%</td><td class="p-4 text-right">108,000</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // Theme Toggle Logic
        function toggleTheme() {
            const body = document.body;
            const icon = document.getElementById('theme-icon');
            body.classList.toggle('light-theme');
            
            const isLight = body.classList.contains('light-theme');
            
            // Swap Icons
            if (isLight) {
                // Moon Icon
                icon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path>`;
            } else {
                // Sun Icon
                icon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707M17.657 17.657l-.707-.707M6.343 6.343l-.707-.707M12 8a4 4 0 100 8 4 4 0 000-8z"></path>`;
            }
        }

        // Ripple Logic
        document.body.addEventListener('click', function(e) {
            const target = e.target.closest('.ripple-btn, .plan-row');
            if (target) {
                const rect = target.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const ripple = document.createElement('span');
                ripple.classList.add('ripple');
                ripple.style.left = x + 'px'; ripple.style.top = y + 'px';
                target.appendChild(ripple);
                setTimeout(() => ripple.remove(), 600);
            }
        });
    </script>
</body>
</html>
