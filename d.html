<!doctype html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UPCASH | Professional Dashboard</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>

    <style>
        :root {
            --brand-emerald: #00CE9C;
            --bg-deep: #0a0f1a;
            --card-navy: #111827;
        }

        body { 
            font-family: 'DM Sans', sans-serif; 
            background-color: var(--bg-deep); 
            color: #ffffff;
            margin: 0;
        }

        .heading-font { font-family: 'Outfit', sans-serif; }

        /* The Glow Ring Style from your Flyer */
        .glow-ring { 
            background: linear-gradient(160deg, #111827 0%, #0d1321 100%);
            box-shadow: 0 0 0 1px rgba(0, 206, 156, 0.15), 0 8px 32px rgba(0, 0, 0, 0.3);
            border-radius: 24px;
            transition: all 0.3s ease;
        }
        .glow-ring:hover { 
            box-shadow: 0 0 0 1px rgba(0, 206, 156, 0.35), 0 12px 40px rgba(0, 0, 0, 0.4);
            transform: translateY(-2px);
        }

        /* Diamond Glow (The Balance Card) */
        .diamond-glow {
            background: linear-gradient(160deg, #0c2a23 0%, #0d1321 100%);
            border: 1px solid rgba(0, 206, 156, 0.25);
            position: relative;
            overflow: hidden;
        }

        .shimmer { 
            background: linear-gradient(110deg, transparent 30%, rgba(255, 255, 255, 0.08) 50%, transparent 70%); 
            background-size: 200% 100%; 
            animation: shimmer 3s infinite; 
        }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

        .btn-emerald {
            background: var(--brand-emerald);
            color: #0a0f1a;
            font-family: 'Outfit', sans-serif;
            font-weight: 700;
            transition: all 0.3s ease;
        }
        .btn-emerald:hover {
            box-shadow: 0 0 20px rgba(0, 206, 156, 0.4);
            transform: scale(1.02);
        }

        /* Decorative background glow */
        .bg-glow {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at top right, rgba(0, 206, 156, 0.05), transparent 400px),
                        radial-gradient(circle at bottom left, rgba(0, 206, 156, 0.03), transparent 400px);
            pointer-events: none;
            z-index: -1;
        }
    </style>
</head>
<body class="pb-10">
    <div class="bg-glow"></div>

    <header class="flex items-center justify-between p-6 max-w-2xl mx-auto">
        <div class="flex items-center gap-2">

            </div>
            <h1 class="heading-font text-xl font-black tracking-tight">UP<span class="text-[#00CE9C]">CASH</span></h1>
        </div>
        <div class="flex gap-3">
             <button onclick="handleLogout()" class="w-10 h-10 rounded-full bg-white/5 border border-white/10 flex items-center justify-center">
                <i data-lucide="log-out" class="w-5 h-5 text-slate-400"></i>
            </button>
            <a href="profile.html" class="w-10 h-10 rounded-full bg-[#00CE9C]/10 border border-[#00CE9C]/20 flex items-center justify-center">
                <i data-lucide="user" class="w-5 h-5 text-[#00CE9C]"></i>
            </a>
        </div>
    </header>

    <main class="px-5 max-w-2xl mx-auto space-y-6">
        
        <div class="flex items-center justify-between">
            <p class="text-slate-400 text-sm">Welcome back, <span class="text-[#00CE9C] font-bold" id="username">User</span></p>
            <span class="bg-[#00CE9C]/10 border border-[#00CE9C]/20 text-[#00CE9C] text-[10px] font-bold px-2 py-1 rounded-full uppercase tracking-widest">Verified Account</span>
        </div>

        <div class="diamond-glow rounded-[32px] p-8 shadow-2xl">
            <div class="shimmer absolute inset-0"></div>
            <div class="relative z-10">
                <div class="flex justify-between items-center mb-2">
                    <p class="text-emerald-100/60 text-xs font-bold tracking-widest uppercase">Available Balance</p>
                    <button onclick="toggleBalance()" class="text-white/40 hover:text-white">

                    </button>
                </div>
                <h3 class="heading-font text-4xl font-black mb-8">UGX <span id="balance">*****</span></h3>
                
                <div class="grid grid-cols-2 gap-4">
                    <div class="bg-white/5 rounded-2xl p-4 border border-white/5">
                        <p class="text-[10px] text-white/40 uppercase font-bold tracking-tighter">Total Investment</p>
                        <p class="font-bold text-lg heading-font" id="totalInv">UGX 0</p>
                    </div>
                    <div class="bg-white/5 rounded-2xl p-4 border border-white/5">
                        <p class="text-[10px] text-white/40 uppercase font-bold tracking-tighter">Total Withdrawn</p>
                        <p class="font-bold text-lg heading-font" id="totalWith">UGX 0</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-4">
            <a href="transactions.html" class="w-full">
                <button class="w-full h-14 btn-emerald rounded-2xl flex items-center justify-center gap-2">
                    <i data-lucide="history" class="w-5 h-5"></i> Transactions
                </button>
            </a>
            <a href="withdraw.html" class="w-full">
                <button class="w-full h-14 glow-ring border-none flex items-center justify-center gap-2 font-bold heading-font">
                    <i data-lucide="arrow-up-circle" class="w-5 h-5 text-[#00CE9C]"></i> Withdraw
                </button>
            </a>
        </div>

        <div class="grid grid-cols-2 gap-4">
            <button onclick="copyLink()" id="referral-btn" class="h-14 glow-ring border-none flex items-center justify-center gap-2 text-sm font-bold">
                <i data-lucide="copy" class="w-4 h-4 text-[#00CE9C]"></i> Referral Link
            </button>
            <a href="https://chat.whatsapp.com/YOUR_LINK" target="_blank" class="h-14 rounded-2xl bg-emerald-500/10 border border-emerald-500/20 flex items-center justify-center gap-2 text-emerald-400 font-bold text-sm">
                <i data-lucide="message-circle" class="w-4 h-4"></i> Community
            </a>
        </div>

        <div class="space-y-4 pt-4">
            <h4 class="heading-font text-lg font-bold flex items-center gap-2">
                <i data-lucide="briefcase" class="text-[#00CE9C] w-5 h-5"></i> Active Investment Plans
            </h4>
            <div class="glow-ring overflow-hidden">
                <table class="w-full text-left text-sm">
                    <thead class="bg-white/5 text-slate-500 text-[10px] uppercase font-bold">
                        <tr>
                            <th class="p-4">Plan</th>
                            <th class="p-4 text-center">ROI</th>
                            <th class="p-4 text-right">Min Amount</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-white/5">
                        <tr onclick="location.href='basic.html'" class="hover:bg-white/5 transition-colors cursor-pointer">
                            <td class="p-4 font-bold text-[#00CE9C]">BASIC</td>
                            <td class="p-4 text-center text-slate-300">8% / 40 Days</td>
                            <td class="p-4 text-right font-bold">10,000</td>
                        </tr>
                        <tr onclick="location.href='silver.html'" class="hover:bg-white/5 transition-colors cursor-pointer">
                            <td class="p-4 font-bold text-cyan-400">SILVER</td>
                            <td class="p-4 text-center text-slate-300">10% / 30 Days</td>
                            <td class="p-4 text-right font-bold">108,000</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>
