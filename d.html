<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UPCASH | Login</title>
    
    <meta name="theme-color" content="#0f172a">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Inter', sans-serif;
            /* Matches theme-color exactly at the top for seamless blending */
            background-color: #0f172a;
            background-image: radial-gradient(circle at center top, #1e293b 0%, #0f172a 100%);
            min-height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            color: #e2e8f0;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .input-field {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }

        .input-field:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2);
            outline: none;
        }
    </style>
</head>
<body class="items-center justify-center p-6">

    <div class="w-full max-w-md">
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center bg-blue-600 p-3 rounded-2xl mb-4 shadow-lg shadow-blue-500/20">
                <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"></path>
                </svg>
            </div>
            <h1 class="text-3xl font-bold tracking-tight">UP<span class="text-blue-500">CASH</span></h1>
            <p class="text-slate-400 mt-2">Sign in to manage your growth</p>
        </div>

        <div class="glass-panel rounded-3xl p-8 shadow-2xl">
            <form action="#" class="space-y-5">
                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-1.5 ml-1">Email Address</label>
                    <input type="email" placeholder="name@company.com" class="input-field w-full px-4 py-3 rounded-xl text-white placeholder-slate-500">
                </div>

                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-1.5 ml-1">Password</label>
                    <input type="password" placeholder="••••••••" class="input-field w-full px-4 py-3 rounded-xl text-white placeholder-slate-500">
                </div>

                <div class="flex items-center justify-between text-xs px-1">
                    <label class="flex items-center gap-2 cursor-pointer">
                        <input type="checkbox" class="rounded border-slate-700 bg-slate-800 text-blue-500">
                        <span class="text-slate-400">Remember me</span>
                    </label>
                    <a href="#" class="text-blue-400 hover:text-blue-300 font-semibold">Forgot password?</a>
                </div>

                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3.5 rounded-xl transition-all active:scale-[0.98] shadow-lg shadow-blue-600/20 mt-2">
                    Sign In
                </button>
            </form>

            <div class="mt-8 text-center">
                <p class="text-sm text-slate-400">
                    Don't have an account? 
                    <a href="register.html" class="text-blue-400 font-bold hover:underline ml-1">Create Account</a>
                </p>
            </div>
        </div>

        <p class="text-center text-slate-500 text-[10px] uppercase tracking-widest mt-8">
            &copy; 2026 UPCASH Business Platform
        </p>
    </div>

</body>
</html>
