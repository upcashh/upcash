<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UPCASH | Secure Withdrawal</title>
    
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background: radial-gradient(circle at center top, #1e293b 0%, #0f172a 100%); 
            background-color: #0f172a;
            min-height: 100vh; 
            color: #e2e8f0; 
            -webkit-font-smoothing: antialiased;
        }
        .glass-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .btn-gradient { background: linear-gradient(135deg, #3b82f6, #2563eb); border: none; color: white; transition: all 0.3s ease; }
        .text-gradient { background: linear-gradient(90deg, #60a5fa, #a855f7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .badge-pending { background: rgba(245, 158, 11, 0.1); color: #fbbf24; border: 1px solid rgba(245, 158, 11, 0.2); }
        .badge-completed { background: rgba(16, 185, 129, 0.1); color: #10b981; border: 1px solid rgba(16, 185, 129, 0.2); }

        .skeleton { background: rgba(255, 255, 255, 0.05); animation: pulse 1.5s infinite; border-radius: 12px; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    </style>
</head>
<body class="pb-20">

    <header class="w-full bg-[#0f172a] border-b border-white/5 sticky top-0 z-[999]">
        <div class="max-w-lg mx-auto flex items-center justify-between px-5 py-4">
            <div class="flex items-center gap-3">
                <div class="bg-blue-600 p-2 rounded-lg">
                    <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"></path></svg>
                </div>
                <h1 class="text-xl font-bold tracking-tight">UP<span class="text-blue-500">CASH</span></h1>
            </div>
            <a href="dashboard.html" class="p-2 bg-white/5 rounded-full text-slate-400 border border-white/10">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
            </a>
        </div>
    </header>

    <div id="skeleton-ui" class="p-4 max-w-lg mx-auto space-y-6">
        <div class="h-32 skeleton"></div>
        <div class="h-20 skeleton"></div>
        <div class="h-56 skeleton"></div>
    </div>

    <main id="main-content" class="p-4 max-w-lg mx-auto space-y-6 hidden">
        <div class="rounded-3xl p-6 shadow-2xl border border-white/10" style="background: linear-gradient(135deg, #1e3a8a, #4338ca);">
            <p class="text-blue-200/70 text-sm font-medium mb-1">Available for Cash-out</p>
            <h3 class="text-4xl font-black text-white" id="availBalance">UGX 0</h3>
        </div>

        <div class="glass-card rounded-2xl p-4 flex items-center gap-4 border-white/10">
            <div class="bg-blue-500/10 p-3 rounded-xl">
                <svg class="w-6 h-6 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 18h.01M8 21h8a2 2 0 002-2V5a2 2 0 00-2-2H8a2 2 0 00-2 2v14a2 2 0 002 2z"></path></svg>
            </div>
            <div>
                <p class="text-[10px] text-slate-500 uppercase tracking-widest font-bold">Recipient Number</p>
                <p class="font-bold text-lg text-white" id="recipientNum">---</p>
            </div>
        </div>

        <div class="glass-card rounded-3xl p-6 border-white/10">
            <label class="block text-slate-400 text-xs font-bold uppercase tracking-wider mb-4">Amount to Withdraw</label>
            <div class="relative mb-6">
                <span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 font-bold">UGX</span>
                <input type="number" id="withdrawAmount" placeholder="Min 10,000" class="w-full bg-slate-900/50 border border-white/10 rounded-xl py-4 pl-14 pr-4 text-xl font-bold text-white focus:outline-none focus:border-blue-500 transition">
            </div>
            <button id="withdrawBtn" onclick="handleWithdraw()" class="w-full py-4 rounded-xl btn-gradient font-black text-lg shadow-xl active:scale-95 transition flex items-center justify-center gap-2">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 9V7a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2m2 4h10a2 2 0 002-2v-6a2 2 0 00-2-2H9a2 2 0 00-2 2v6a2 2 0 002 2zm7-5a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
                INITIATE CASH-OUT
            </button>
        </div>

        <div class="space-y-4">
            <h4 class="text-lg font-bold flex items-center gap-2 text-gradient">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                Withdrawal History
            </h4>
            <div class="glass-card rounded-2xl overflow-hidden border-white/10">
                <table class="w-full text-left text-sm">
                    <thead class="bg-white/5 text-slate-500 text-[10px] uppercase tracking-widest font-bold">
                        <tr>
                            <th class="p-4">Details</th>
                            <th class="p-4 text-center">Status</th>
                            <th class="p-4 text-right">Amount</th>
                        </tr>
                    </thead>
                    <tbody id="withdrawTableBody" class="divide-y divide-white/5">
                    </tbody>
                </table>
            </div>
        </div>
    </main>
    
<script>
    const supabaseClient = supabase.createClient('https://wbodpfbmilhperccgzei.supabase.co', 'sb_publishable_CTQy3-UTfBu_U8kl3lWLXQ_7Ki4gukN');

    async function loadUserData() {
        try {
            const { data: { user } } = await supabaseClient.auth.getUser();
            if (!user) {
                window.location.href = "signin.html";
                return;
            }

            const { data: profile } = await supabaseClient
                .from('userinfo')
                .select('available_balance, telephone')
                .eq('userid', user.id)
                .single();

            if (profile) {
                document.getElementById('availBalance').textContent = 'UGX ' + Number(profile.available_balance).toLocaleString();
                document.getElementById('recipientNum').textContent = profile.telephone;
            }

            const { data: history } = await supabaseClient
                .from('user_history')
                .select('created_at, amount, status, category')
                .eq('userid', user.id)
                .eq('category', 'Withdraw') 
                .order('created_at', { ascending: false });

            const tbody = document.getElementById('withdrawTableBody');
            
            if (history && history.length > 0) {
                tbody.innerHTML = history.map(row => {
                    const statusStr = row.status ? row.status.toLowerCase() : 'pending';
                    const statusClass = statusStr === 'completed' ? 'badge-completed' : 'badge-pending';
                    
                    return `
                    <tr class="hover:bg-white/[0.02]">
                        <td class="p-4">
                            <span class="text-white font-semibold text-xs block">${new Date(row.created_at).toLocaleDateString()}</span>
                            <span class="text-[9px] text-slate-500 uppercase font-mono">${new Date(row.created_at).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</span>
                        </td>
                        <td class="p-4 text-center">
                            <span class="px-2 py-1 rounded-full text-[8px] font-black uppercase ${statusClass}">
                                ${row.status || 'Processing'}
                            </span>
                        </td>
                        <td class="p-4 text-right">
                            <span class="font-bold text-red-400 block">UGX ${Math.abs(row.amount).toLocaleString()}</span>
                            <span class="text-[9px] text-slate-600">Mobile Money</span>
                        </td>
                    </tr>`;
                }).join('');
            } else {
                tbody.innerHTML = `<tr><td class="p-10 text-center text-slate-500 italic text-xs" colspan="3">No records found.</td></tr>`;
            }

        } catch (err) {
            console.error(err);
        } finally {
            // Ensure UI shows even if data fetch fails slightly
            document.getElementById('skeleton-ui').classList.add('hidden');
            document.getElementById('main-content').classList.remove('hidden');
        }
    }

    async function handleWithdraw() {
        const input = document.getElementById('withdrawAmount');
        const btn = document.getElementById('withdrawBtn');
        const amount = parseFloat(input.value);
        
        if (!amount || amount < 10000) return alert("Minimum withdrawal is UGX 10,000");

        btn.disabled = true;
        btn.innerHTML = `PROCESSING...`;

        const { data: { user } } = await supabaseClient.auth.getUser();
        const { data, error } = await supabaseClient.rpc('withdraw_funds', { 
            user_id_param: user.id, 
            amount_to_withdraw: amount 
        });

        if (data?.success) { 
            alert("Withdrawal request successful!"); 
            location.reload(); 
        } else { 
            alert("Request Failed: " + (data?.message || "Check your balance.")); 
            btn.disabled = false;
            btn.innerText = "INITIATE CASH-OUT";
        }
    }

    window.onload = loadUserData;
</script>
</body>
</html>
