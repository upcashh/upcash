<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Transactions | UPCASH</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: radial-gradient(circle at top left, #1e293b, #0f172a); color: #e2e8f0; min-height: 100vh; }
        .glass-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        /* Removed horizontal scroll - table is now static/fixed */
        .table-container { width: 100%; overflow: hidden; }
        .skeleton { background: linear-gradient(90deg, rgba(255,255,255,0.03) 25%, rgba(255,255,255,0.08) 50%, rgba(255,255,255,0.03) 75%); background-size: 200% 100%; animation: loading 1.5s infinite; }
        @keyframes loading { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
        
        /* Ensure table columns don't squish too much but stay within screen */
        table { table-layout: fixed; width: 100%; }
    </style>
</head>
<body class="pb-10">

    <header class="flex items-center justify-between p-5 sticky top-0 bg-[#0f172a]/80 backdrop-blur-md z-50 border-b border-white/5">
        <div class="flex items-center gap-3">
            <div class="bg-blue-600 p-2 rounded-lg shadow-lg shadow-blue-500/20">
                <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"></path>
                </svg>
            </div>
            <h1 class="text-xl font-extrabold tracking-tighter text-white">UP<span class="text-blue-500">CASH</span></h1>
        </div>
        <a href="dashboard.html" class="p-2 bg-white/5 rounded-full border border-white/10 transition-all hover:bg-white/10">
            <svg class="w-6 h-6 text-slate-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
        </a>
    </header>

    <main class="p-4 max-w-4xl mx-auto space-y-6">
        <h2 class="text-2xl font-extrabold text-white tracking-tight mt-4">My Transactions</h2>

        <div class="glass-card rounded-3xl overflow-hidden shadow-2xl">
            <div class="table-container">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-white/5 text-[9px] uppercase tracking-wider text-slate-500 font-black">
                        <tr>
                            <th class="px-4 py-4 w-[35%]">Status</th>
                            <th class="px-2 py-4 w-[35%] text-right">Amount</th>
                            <th class="px-4 py-4 w-[30%] text-right">Balance</th>
                        </tr>
                    </thead>
                    <tbody id="history-body" class="divide-y divide-white/5 text-sm">
                        <tr class="skeleton-row"><td class="px-4 py-5"><div class="h-8 w-8 skeleton rounded-lg mb-2"></div><div class="h-3 w-16 skeleton rounded"></div></td><td class="px-2 py-5"><div class="h-4 w-20 skeleton rounded ml-auto"></div></td><td class="px-4 py-5"><div class="h-3 w-14 skeleton rounded ml-auto"></div></td></tr>
                        <tr class="skeleton-row"><td class="px-4 py-5"><div class="h-8 w-8 skeleton rounded-lg mb-2"></div><div class="h-3 w-16 skeleton rounded"></div></td><td class="px-2 py-5"><div class="h-4 w-20 skeleton rounded ml-auto"></div></td><td class="px-4 py-5"><div class="h-3 w-14 skeleton rounded ml-auto"></div></td></tr>
                    </tbody>
                </table>
            </div>
            <div id="loading-text" class="p-10 text-center text-slate-500 animate-pulse text-[10px] font-bold uppercase tracking-widest">Syncing ledger...</div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const supabaseClient = supabase.createClient('https://wbodpfbmilhperccgzei.supabase.co', 'sb_publishable_CTQy3-UTfBu_U8kl3lWLXQ_7Ki4gukN');

        function getCategoryIcon(category) {
            const cat = category.toLowerCase();
            if (cat.includes('deposit')) return `<svg class="w-5 h-5 text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>`;
            if (cat.includes('earning')) return `<svg class="w-5 h-5 text-yellow-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"></path></svg>`;
            if (cat.includes('bonus') || cat.includes('commission')) return `<svg class="w-5 h-5 text-purple-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v13m0-13V6a2 2 0 112 2h-2zm0 0V5.5A2.5 2.5 0 109.5 8H12zm-7 4h14M5 12a2 2 0 110-4h14a2 2 0 110 4M5 12v7a2 2 0 002 2h10a2 2 0 002-2v-7"></path></svg>`;
            if (cat.includes('plan purchase')) return `<svg class="w-5 h-5 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"></path></svg>`;
            return `<svg class="w-5 h-5 text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12H9m12 0a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>`;
        }

        async function loadHistory() {
            const { data: { user } } = await supabaseClient.auth.getUser();
            if(!user) return;

            const { data, error } = await supabaseClient
                .from('user_history')
                .select('*')
                .eq('userid', user.id)
                .order('created_at', { ascending: false });
            
            const tbody = document.getElementById('history-body');
            tbody.innerHTML = '';
            document.getElementById('loading-text').classList.add('hidden');

            if (data && data.length > 0) {
                data.forEach(row => {
                    const isPos = row.amount > 0;
                    const tr = document.createElement('tr');
                    tr.className = "hover:bg-white/[0.02] transition-colors";
                    tr.innerHTML = `
                        <td class="px-4 py-5">
                            <div class="flex items-center gap-2 mb-1">
                                <div class="p-1.5 bg-white/5 rounded-lg">${getCategoryIcon(row.category)}</div>
                                <span class="font-bold text-white text-xs truncate">${row.category}</span>
                            </div>
                            <span class="text-[9px] text-slate-500 uppercase block font-medium">${new Date(row.created_at).toLocaleDateString()}</span>
                        </td>
                        <td class="px-2 py-5 text-right font-black ${isPos ? 'text-green-400' : 'text-red-500'} text-xs">
                            ${isPos ? '+' : '-'}${Math.abs(row.amount).toLocaleString()}
                        </td>
                        <td class="px-4 py-5 text-right font-mono text-slate-400 text-[10px]">
                            ${Number(row.new_balance).toLocaleString()}
                        </td>
                    `;
                    tbody.appendChild(tr);
                });
            } else {
                tbody.innerHTML = '<tr><td colspan="3" class="p-10 text-center text-slate-500">No transactions</td></tr>';
            }
        }
        loadHistory();
    </script>
</body>
</html>
