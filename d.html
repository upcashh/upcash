<!doctype html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UPCASH | Dashboard</title>
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'DM Sans', sans-serif; background-color: #0a0f1a; color: #ffffff; }
        .heading-font { font-family: 'Outfit', sans-serif; }
        .glass-card { background: rgba(17, 24, 39, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 24px; }
        .glow-green { box-shadow: 0 0 20px rgba(0, 206, 156, 0.15); border: 1px solid rgba(0, 206, 156, 0.3); }
        .shimmer { background: linear-gradient(110deg, transparent 30%, rgba(255,255,255,0.05) 50%, transparent 70%); background-size: 200% 100%; animation: shimmer 3s infinite; }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    </style>
</head>
<body class="p-4 sm:p-8">

    <nav class="max-w-5xl mx-auto flex justify-between items-center mb-10">
        <h1 class="heading-font text-2xl font-black tracking-tight text-white">UPCASH<span class="text-[#00CE9C]">.</span></h1>
        <div class="flex items-center gap-4">
            <div class="w-10 h-10 rounded-full bg-[#00CE9C]/10 border border-[#00CE9C]/20 flex items-center justify-center">
                <i data-lucide="user" class="text-[#00CE9C] w-5 h-5"></i>
            </div>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto space-y-6">
        
        <div class="glass-card glow-green p-8 relative overflow-hidden">
            <div class="shimmer absolute inset-0 pointer-events-none"></div>
            <div class="relative z-10">
                <p class="text-[#8a95a8] text-sm font-medium mb-1">Total Available Balance</p>
                <h2 class="heading-font text-4xl sm:text-5xl font-extrabold mb-6 tracking-tight">
                    <span class="text-[#00CE9C] text-2xl">UGX</span> 1,250,000
                </h2>
                <div class="flex gap-3">
                    <button class="flex-1 bg-[#00CE9C] text-[#0a0f1a] py-3 rounded-xl font-bold heading-font transition-transform hover:scale-[1.02] active:scale-95">
                        Deposit
                    </button>
                    <button class="flex-1 bg-white/5 border border-white/10 text-white py-3 rounded-xl font-bold heading-font hover:bg-white/10 transition-colors">
                        Withdraw
                    </button>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-4">
            <div class="glass-card p-5">
                <i data-lucide="trending-up" class="text-[#00CE9C] mb-2 w-5 h-5"></i>
                <p class="text-[#8a95a8] text-xs uppercase tracking-widest font-bold">Total Profit</p>
                <p class="heading-font text-xl font-bold">+UGX 45,000</p>
            </div>
            <div class="glass-card p-5">
                <i data-lucide="pie-chart" class="text-blue-400 mb-2 w-5 h-5"></i>
                <p class="text-[#8a95a8] text-xs uppercase tracking-widest font-bold">Active Plans</p>
                <p class="heading-font text-xl font-bold">2 Plans</p>
            </div>
        </div>

        <div class="glass-card p-6 overflow-hidden">
            <div class="flex justify-between items-center mb-6">
                <h3 class="heading-font font-bold text-lg">Recent History</h3>
                <a href="#" class="text-[#00CE9C] text-sm font-medium hover:underline">View All</a>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead>
                        <tr class="text-[#5a6477] text-xs uppercase tracking-tighter border-b border-white/5">
                            <th class="pb-3 font-bold">Type</th>
                            <th class="pb-3 font-bold">Amount</th>
                            <th class="pb-3 font-bold">Status</th>
                        </tr>
                    </thead>
                    <tbody class="text-sm divide-y divide-white/5">
                        <tr>
                            <td class="py-4 font-medium">Withdraw</td>
                            <td class="py-4">UGX 50,000</td>
                            <td class="py-4">
                                <span class="px-2 py-1 rounded-md text-[10px] font-bold bg-[#00CE9C]/10 text-[#00CE9C]">COMPLETED</span>
                            </td>
                        </tr>
                        <tr>
                            <td class="py-4 font-medium">Profit Share</td>
                            <td class="py-4">UGX 12,000</td>
                            <td class="py-4">
                                <span class="px-2 py-1 rounded-md text-[10px] font-bold bg-blue-500/10 text-blue-400">PENDING</span>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        // Initialize the icons
        lucide.createIcons();
    </script>
</body>
</html>
