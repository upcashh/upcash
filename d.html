<!doctype html>
<html lang="en">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0a0f1a">
  <title>UPCASH | Professional Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&amp;family=DM+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
        * { box-sizing: border-box; }
        
        html, body { 
            height: 100%;
            width: 100%;
            margin: 0;
            padding: 0;
        }
        
        body { 
            font-family: 'DM Sans', sans-serif; 
            background-color: #0a0f1a;
            min-height: 100vh; 
            color: #e2e8f0; 
            -webkit-font-smoothing: antialiased;
        }
        
        /* Elite Theme Background */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 50%, rgba(0, 206, 156, 0.08) 0%, transparent 50%),
                        radial-gradient(circle at 80% 80%, rgba(0, 206, 156, 0.05) 0%, transparent 50%);
            pointer-events: none;
            z-index: -1;
        }
        
        /* The Glow Ring Style from Flyer */
        .glass-card { 
            background: linear-gradient(160deg, #111827 0%, #0d1321 100%); 
            backdrop-filter: blur(12px); 
            border: 1px solid rgba(0, 206, 156, 0.15); 
            box-shadow: 0 0 0 1px rgba(0, 206, 156, 0.1), 0 8px 32px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
        }
        
        /* Diamond/Elite Glow for Balance Card */
        .diamond-glow {
            background: linear-gradient(160deg, #0c2a23 0%, #0d1321 100%);
            border: 1px solid rgba(0, 206, 156, 0.25);
            position: relative;
            overflow: hidden;
        }

        .shimmer { 
            background: linear-gradient(110deg, transparent 30%, rgba(255, 255, 255, 0.08) 50%, transparent 70%); 
            background-size: 200% 100%; 
            animation: shimmer 3s infinite; 
            position: absolute;
            inset: 0;
            pointer-events: none;
        }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

        .btn-gradient { 
            background: #00CE9C; 
            border: none; 
            color: #0a0f1a; 
            transition: all 0.3s ease; 
            font-family: 'Outfit', sans-serif; 
            font-weight: 700; 
        }
        
        .btn-gradient:hover { 
            box-shadow: 0 0 24px rgba(0, 206, 156, 0.4); 
            transform: translateY(-2px); 
        }
        
        .text-gradient { 
            color: #00CE9C;
            font-family: 'Outfit', sans-serif; 
            font-weight: 800; 
        }
        
        .header-bg {
            background: rgba(10, 15, 26, 0.8);
            border-bottom: 1px solid rgba(0, 206, 156, 0.1);
            backdrop-filter: blur(15px);
        }

        .plan-row:hover {
            background: rgba(0, 206, 156, 0.05) !important;
        }

        .ripple {
            position: absolute;
            background: rgba(0, 206, 156, 0.3);
            border-radius: 50%;
            transform: scale(0);
            animation: ripple-animation 0.6s linear;
            pointer-events: none;
        }
        @keyframes ripple-animation {
            to { transform: scale(4); opacity: 0; }
        }

        .skeleton { background: rgba(0, 206, 156, 0.05); overflow: hidden; position: relative; }
    </style>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
 </head>
 <body class="pb-20">
  <header class="header-bg flex items-center justify-between p-5 sticky top-0 z-50">
   <div class="flex items-center gap-2">
    <div class="bg-[#00CE9C] p-2 rounded-lg">
     <svg class="w-5 h-5 text-[#0a0f1a]" fill="none" stroke="currentColor" viewbox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"></path></svg>
    </div>
    <h1 class="text-xl font-bold tracking-tight font-['Outfit'] text-white">UP<span style="color: #00CE9C;">CASH</span></h1>
   </div>
   <div class="flex items-center gap-4">
    <a href="profile.html" class="block">
        <button class="p-2 hover:bg-white/5 rounded-full transition-colors text-slate-400">
            <i data-lucide="user" class="w-6 h-6"></i>
        </button>
    </a>
    <button class="p-2 hover:bg-white/5 rounded-full transition-colors text-[#00CE9C]">
        <i data-lucide="menu" class="w-7 h-7"></i>
    </button>
   </div>
  </header>

  <div id="skeleton-container" class="p-4 max-w-lg mx-auto space-y-6">
   <div class="rounded-3xl p-6 h-56 skeleton border border-white/5"></div>
  </div>

  <div id="dashboard-content" class="hidden">
   <div class="flex items-center justify-between w-full px-5 py-4">
    <p class="text-slate-400 text-sm font-medium">Welcome back, <span class="text-gradient" id="username">User</span></p>
    <span id="verified-badge" class="bg-[#00CE9C]/10 border border-[#00CE9C]/20 text-[#00CE9C] text-[9px] font-bold px-2 py-0.5 rounded-full uppercase tracking-widest"> Verified Account </span>
   </div>

   <main class="p-4 max-w-lg mx-auto space-y-6">
    <div class="diamond-glow rounded-[32px] p-6 shadow-2xl">
     <div class="shimmer"></div>
     <div class="relative z-10">
        <div class="flex justify-between items-start mb-1">
          <p class="text-emerald-100/60 text-xs font-bold tracking-widest uppercase">Available Balance</p>
          <button onclick="toggleBalance()" class="text-white/40 hover:text-white transition-colors">
            <i id="eyeIcon" data-lucide="eye-off" class="w-5 h-5"></i>
          </button>
        </div>
        <h3 class="text-4xl font-black mb-6 text-white font-['Outfit']">UGX <span id="balance">*****</span></h3>
        <div class="grid grid-cols-2 gap-4">
          <div class="bg-white/5 backdrop-blur-md rounded-2xl p-3 border border-white/5">
           <p class="text-[10px] text-white/40 uppercase font-bold tracking-tighter">Total Investment</p>
           <p class="font-bold text-lg text-white" id="totalInv">UGX 0</p>
          </div>
          <div class="bg-white/5 backdrop-blur-md rounded-2xl p-3 border border-white/5">
           <p class="text-[10px] text-white/40 uppercase font-bold tracking-tighter">Total Withdrawn</p>
           <p class="font-bold text-lg text-white" id="totalWith">UGX 0</p>
          </div>
        </div>
     </div>
    </div>

    <div class="flex gap-4">
     <a href="transactions.html" class="flex-1"> 
        <button class="btn-gradient w-full h-14 rounded-2xl flex items-center justify-center gap-2 text-sm shadow-lg">
            <i data-lucide="file-text" class="w-5 h-5"></i>Transactions 
        </button> 
     </a> 
     <a href="withdraw.html" class="flex-1"> 
        <button class="glass-card w-full h-14 font-bold rounded-2xl flex items-center justify-center gap-2 text-sm text-white">
            <i data-lucide="arrow-up-circle" class="w-5 h-5 text-[#00CE9C]"></i>Withdraw 
        </button> 
     </a>
    </div>

    <div class="grid grid-cols-2 gap-4">
     <button onclick="copyLink()" id="referral-btn" class="glass-card h-14 font-bold rounded-2xl flex items-center justify-center gap-2 text-sm text-white">
        <i data-lucide="share-2" class="w-4 h-4 text-[#00CE9C]"></i>Referral Link 
     </button> 
     <a href="https://chat.whatsapp.com/HEusxMonb275LAHnJbooY2" target="_blank" class="bg-[#00CE9C]/10 border border-[#00CE9C]/20 h-14 font-bold rounded-2xl flex items-center justify-center gap-2 text-sm text-[#00CE9C]">
        <i data-lucide="users" class="w-4 h-4"></i> Community
     </a>
    </div>

    <div class="space-y-3">
     <h4 class="text-lg font-bold flex items-center gap-2 font-['Outfit']">
      <i data-lucide="bar-chart-3" class="text-[#00CE9C] w-5 h-5"></i> Investment Plans
     </h4>
     <div class="glass-card rounded-2xl overflow-hidden">
      <table class="w-full text-left text-sm">
       <thead class="bg-white/5 text-slate-500 text-[10px] uppercase font-bold">
        <tr>
         <th class="p-4">Plan</th>
         <th class="p-4 text-center">ROI</th>
         <th class="p-4 text-right">Min Amount</th>
        </tr>
       </thead>
       <tbody class="divide-y divide-white/5 text-white">
        <tr onclick="location.href='basic.html'" class="plan-row cursor-pointer transition-all">
         <td class="p-4 font-bold text-[#00CE9C]">Basic</td>
         <td class="p-4 text-center">8% / 40d</td>
         <td class="p-4 text-right font-medium">10,000</td>
        </tr>
        <tr onclick="location.href='silver.html'" class="plan-row cursor-pointer transition-all">
         <td class="p-4 font-bold text-cyan-400">Silver</td>
         <td class="p-4 text-center">10% / 30d</td>
         <td class="p-4 text-right font-medium">108,000</td>
        </tr>
        <tr onclick="location.href='gold.html'" class="plan-row cursor-pointer transition-all">
         <td class="p-4 font-bold text-amber-400">Gold</td>
         <td class="p-4 text-center">12% / 25d</td>
         <td class="p-4 text-right font-medium">525,000</td>
        </tr>
       </tbody>
      </table>
     </div>
    </div>
   </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
        lucide.createIcons();

        // Ripple Effect
        document.body.addEventListener('click', function(e) {
            const target = e.target.closest('button, .plan-row');
            if (target) {
                const rect = target.getBoundingClientRect();
                const ripple = document.createElement('span');
                ripple.className = 'ripple';
                ripple.style.left = (e.clientX - rect.left) + 'px';
                ripple.style.top = (e.clientY - rect.top) + 'px';
                target.appendChild(ripple);
                setTimeout(() => ripple.remove(), 600);
            }
        });

        const supabaseClient = supabase.createClient(
            'https://wbodpfbmilhperccgzei.supabase.co', 
            'sb_publishable_CTQy3-UTfBu_U8kl3lWLXQ_7Ki4gukN'
        );

        let realBalance = 0;
        let isHidden = true;

        async function checkAuthAndLoad() {
            document.getElementById('skeleton-container').classList.add('hidden');
            document.getElementById('dashboard-content').classList.remove('hidden');

            try {
                const { data: { session } } = await supabaseClient.auth.getSession();
                if (!session) {
                    window.location.href = "signin.html";
                    return;
                }

                const userId = session.user.id;
                const { data, error: fetchError } = await supabaseClient
                    .from('userinfo')
                    .select('username, available_balance, total_investment, total_withdrawn')
                    .eq('userid', userId)
                    .single();

                if (data) {
                    realBalance = data.available_balance || 0;
                    document.getElementById('username').innerText = data.username || "User";
                    updateBalanceDisplay();
                    document.getElementById('totalInv').innerText = "UGX " + Number(data.total_investment || 0).toLocaleString();
                    document.getElementById('totalWith').innerText = "UGX " + Number(data.total_withdrawn || 0).toLocaleString();
                }
            } catch (err) { console.error(err); }
        }

        function toggleBalance() {
            isHidden = !isHidden;
            updateBalanceDisplay();
        }

        function updateBalanceDisplay() {
            const balanceSpan = document.getElementById('balance');
            const eyeIcon = document.getElementById('eyeIcon');
            if (isHidden) {
                balanceSpan.innerText = "*****";
                eyeIcon.setAttribute('data-lucide', 'eye-off');
            } else {
                balanceSpan.innerText = Number(realBalance).toLocaleString();
                eyeIcon.setAttribute('data-lucide', 'eye');
            }
            lucide.createIcons();
        }

        async function copyLink() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (!session) return;
            const { data } = await supabaseClient.from('userinfo').select('username').eq('userid', session.user.id).single();
            if (data) {
                const link = `https://upcashh.github.io/upcash/register.html?ref=${data.username}`;
                navigator.clipboard.writeText(link);
                alert("Link Copied!");
            }
        }
        
        checkAuthAndLoad();
  </script>
 </body>
</html>
