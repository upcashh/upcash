<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Transactions | UPCASH</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background: radial-gradient(circle at top left, #1e293b, #0f172a); 
            color: #e2e8f0; 
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }
        .glass-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .table-container { overflow-x: auto; }
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
    </style>
</head>
<body class="pb-10">

    <header class="flex items-center justify-between p-5 sticky top-0 bg-[#0f172a]/80 backdrop-blur-md z-50 border-b border-white/5">
        <div class="flex items-center gap-3">
            <div class="bg-blue-600 p-2 rounded-lg shadow-lg shadow-blue-500/20">
                <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"></path>
                </svg>
            </div>
            <h1 class="text-xl font-extrabold tracking-tighter text-white">UP<span class="text-blue-500">CASH</span></h1>
        </div>
        <a href="dashboard.html" class="p-2 bg-white/5 hover:bg-white/10 rounded-full transition-all border border-white/10">
            <svg class="w-6 h-6 text-slate-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
        </a>
    </header>

    <main class="p-5 max-w-4xl mx-auto space-y-6">
        <div class="flex items-center gap-3 mt-4">
            <h2 class="text-2xl font-extrabold text-white tracking-tight">My Transactions</h2>
        </div>

        <div class="glass-card rounded-3xl overflow-hidden shadow-2xl border-white/5">
            <div class="table-container">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-white/5 text-[10px] uppercase tracking-widest text-slate-500 font-black">
                        <tr>
                            <th class="px-6 py-4">Status & Date</th>
                            <th class="px-6 py-4">Action</th>
                            <th class="px-6 py-4 text-right">Amount</th>
                            <th class="px-6 py-4 text-right">Balance</th>
                        </tr>
                    </thead>
                    <tbody id="history-body" class="divide-y divide-white/5">
                        </tbody>
                </table>
            </div>
            
            <div id="loading" class="p-20 text-center animate-pulse">
                <div class="inline-block w-8 h-8 border-4 border-blue-500 border-t-transparent rounded-full animate-spin"></div>
                <p class="mt-4 text-slate-500 font-bold text-xs uppercase tracking-widest">Securing Ledger...</p>
            </div>

            <div id="empty-state" class="hidden p-20 text-center text-slate-500">
                <p class="font-bold">No activity found yet.</p>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // Use your existing credentials
        const supabaseClient = supabase.createClient('https://wbodpfbmilhperccgzei.supabase.co', 'sb_publishable_CTQy3-UTfBu_U8kl3lWLXQ_7Ki4gukN');

        function getIcon(category) {
            const cat = category.toLowerCase();
            if (cat.includes('deposit')) return `<svg class="w-5 h-5 text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>`;
            if (cat.includes('reinvest')) return `<svg class="w-5 h-5 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>`;
            if (cat.includes('withdraw')) return `<svg class="w-5 h-5 text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12H9m12 0a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>`;
            if (cat.includes('earning')) return `<svg class="w-5 h-5 text-yellow-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"></path></svg>`;
            if (cat.includes('bonus') || cat.includes('commission')) return `<svg class="w-5 h-5 text-purple-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v13m0-13V6a2 2 0 112 2h-2zm0 0V5.5A2.5 2.5 0 109.5 8H12zm-7 4h14M5 12a2 2 0 110-4h14a2 2 0 110 4M5 12v7a2 2 0 002 2h10a2 2 0 002-2v-7"></path></svg>`;
            return `<svg class="w-5 h-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"></path></svg>`;
        }

        async function fetchHistory() {
            const { data: { user } } = await supabaseClient.auth.getUser();
            if (!user) return window.location.href = 'login.html';

            const { data, error } = await supabaseClient
                .from('user_history')
                .select('*')
                .eq('userid', user.id)
                .order('created_at', { ascending: false });

            document.getElementById('loading').classList.add('hidden');

            if (error || !data.length) {
                document.getElementById('empty-state').classList.remove('hidden');
                return;
            }

            const tbody = document.getElementById('history-body');
            data.forEach(row => {
                const isPositive = row.amount > 0;
                const tr = document.createElement('tr');
                tr.className = "hover:bg-white/[0.02] transition-colors";
                tr.innerHTML = `
                    <td class="px-6 py-5">
                        <div class="flex items-center gap-3">
                            <div class="p-2 bg-white/5 rounded-xl border border-white/5">
                                ${getIcon(row.category)}
                            </div>
                            <div>
                                <span class="text-[10px] font-black text-slate-500 uppercase tracking-tighter block">Completed</span>
                                <span class="text-xs text-slate-400">${new Date(row.created_at).toLocaleDateString()}</span>
                            </div>
                        </div>
                    </td>
                    <td class="px-6 py-5">
                        <span class="text-sm font-bold text-white block">${row.category}</span>
                        <span class="text-[10px] text-slate-500 block opacity-60 italic">${row.description || ''}</span>
                    </td>
                    <td class="px-6 py-5 text-right font-black ${isPositive ? 'text-green-400' : 'text-red-500'}">
                        ${isPositive ? '+' : '-'}UGX ${Math.abs(row.amount).toLocaleString()}
                    </td>
                    <td class="px-6 py-5 text-right">
                        <span class="text-[10px] text-slate-500 font-bold block">BALANCE</span>
                        <span class="text-sm font-mono text-slate-300">${Number(row.new_balance).toLocaleString()}</span>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }
        fetchHistory();
    </script>
</body>
</html>
