<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile | UPCASH</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root { --grad-start: #3b82f6; --grad-end: #8b5cf6; }
        body { 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background-color: #0f172a; 
            color: white; 
            margin: 0; 
            padding: 20px; 
            -webkit-font-smoothing: antialiased; 
        }
        
        .glass-container {
            max-width: 500px; margin: 0 auto; background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px; padding: 25px; box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }

        .header { display: flex; align-items: center; margin-bottom: 25px; }
        .back-circle { 
            width: 40px; height: 40px; border-radius: 50%; background: rgba(255,255,255,0.05);
            display: flex; align-items: center; justify-content: center; border: 1px solid rgba(255,255,255,0.1);
            text-decoration: none; color: white;
        }

        .profile-hero { text-align: center; margin-bottom: 30px; }
        .avatar-large { 
            width: 110px; height: 110px; background: rgba(255,255,255,0.05);
            border-radius: 30px; margin: 0 auto 15px; display: flex; align-items: center; 
            justify-content: center; border: 1px solid rgba(255,255,255,0.1);
        }
        .username-text { 
            font-size: 26px; font-weight: 800; background: linear-gradient(90deg, #fff, #cbd5e1);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .info-card { 
            background: rgba(30, 41, 59, 0.4); padding: 16px; border-radius: 16px; 
            margin-bottom: 12px; border: 1px solid rgba(255,255,255,0.05);
            display: flex; align-items: center; gap: 15px;
        }
        .icon-wrap { background: rgba(59, 130, 246, 0.1); padding: 10px; border-radius: 12px; color: #60a5fa; }
        .info-details { flex-grow: 1; }
        .label { font-size: 10px; color: #94a3b8; text-transform: uppercase; letter-spacing: 1px; }
        .value { font-size: 14px; font-weight: 600; margin-top: 2px; }

        .action-btn { 
            width: 100%; padding: 15px; border-radius: 16px; border: none; margin-top: 20px;
            background: linear-gradient(90deg, var(--grad-start), var(--grad-end));
            color: white; font-weight: 700; display: flex; align-items: center; justify-content: center; gap: 10px;
            cursor: pointer; text-decoration: none; transition: transform 0.2s;
        }
        footer { text-align: center; color: #64748b; font-size: 10px; margin-top: 30px; }

        /* Skeleton */
        .skeleton { background: rgba(255,255,255,0.05); animation: pulse 1.5s infinite; border-radius: 8px; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    </style>
</head>
<body>

<div class="glass-container">
    <div class="header">
        <a href="dashboard.html" class="back-circle">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M15 18l-6-6 6-6"/></svg>
        </a>
    </div>

    <div id="profile-content">
        <div class="profile-hero">
            <div class="avatar-large">
                <svg width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="#3b82f6" stroke-width="1.5"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
            </div>
            <div class="username-text" id="user-display">Loading...</div>
        </div>

        <div class="info-card">
            <div class="icon-wrap"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6 19.79 19.79 0 01-3.07-8.67A2 2 0 014.11 2h3a2 2 0 012 1.72 12.84 12.84 0 00.7 2.81 2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45 12.84 12.84 0 002.81.7A2 2 0 0122 16.92z"></path></svg></div>
            <div class="info-details"><div class="label">Telephone</div><div class="value" id="phone">-</div></div>
        </div>
        <div class="info-card">
            <div class="icon-wrap"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg></div>
            <div class="info-details"><div class="label">Email</div><div class="value" id="email">-</div></div>
        </div>
        <div class="info-card">
            <div class="icon-wrap"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg></div>
            <div class="info-details"><div class="label">Date Joined</div><div class="value" id="joined">-</div></div>
        </div>
        <div class="info-card">
            <div class="icon-wrap"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg></div>
            <div class="info-details"><div class="label">My Plans</div><div class="value" id="plan">-</div></div>
        </div>

        <a href="affiliates.html" class="action-btn">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 00-3-3.87"></path><path d="M16 3.13a4 4 0 010 7.75"></path></svg>
            My Affiliates
        </a>
    </div>

    <div id="skeleton-view">
        <div class="profile-hero"><div class="avatar-large skeleton"></div><div class="skeleton" style="height:30px; width:150px; margin:0 auto;"></div></div>
        <div class="info-card"><div class="skeleton" style="width:40px; height:40px;"></div><div class="skeleton" style="flex-grow:1; height:40px;"></div></div>
        <div class="info-card"><div class="skeleton" style="width:40px; height:40px;"></div><div class="skeleton" style="flex-grow:1; height:40px;"></div></div>
        <div class="info-card"><div class="skeleton" style="width:40px; height:40px;"></div><div class="skeleton" style="flex-grow:1; height:40px;"></div></div>
        <div class="info-card"><div class="skeleton" style="width:40px; height:40px;"></div><div class="skeleton" style="flex-grow:1; height:40px;"></div></div>
        <div class="skeleton" style="height:50px; margin-top:20px;"></div>
    </div>

    <footer>&copy; UPCASH BUSINESS PLATFORM 2026</footer>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    const supabaseClient = supabase.createClient('https://wbodpfbmilhperccgzei.supabase.co', 'sb_publishable_CTQy3-UTfBu_U8kl3lWLXQ_7Ki4gukN');
    async function loadProfile() {
        document.getElementById('profile-content').style.display = 'none';
        const { data: { user } } = await supabaseClient.auth.getUser();
        if (user) {
            const { data: p } = await supabaseClient.from('userinfo').select('*').eq('userid', user.id).single();
            if (p) {
                document.getElementById('user-display').innerText = p.username;
                document.getElementById('phone').innerText = p.telephone || 'Not set';
                document.getElementById('email').innerText = user.email;
                document.getElementById('joined').innerText = new Date(user.created_at).toLocaleDateString();
                document.getElementById('plan').innerText = p.plan || 'Standard Member';
                document.getElementById('skeleton-view').style.display = 'none';
                document.getElementById('profile-content').style.display = 'block';
            }
        }
    }
    loadProfile();
</script>
</body>
</html>
