<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UPCASH | Secure Withdrawal</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@600;800&family=DM+Sans:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'DM Sans', sans-serif; background-color: #0a0f1a; color: #e2e8f0; margin: 0; }
        .outfit { font-family: 'Outfit', sans-serif; }
        .glass-card { background: linear-gradient(160deg, #111827 0%, #0d1321 100%); border: 1px solid rgba(0, 206, 156, 0.15); }
        .btn-primary { background: #00ce9c; color: #0a0f1a; font-weight: 800; transition: all 0.3s ease; }
        .animate-reveal { animation: fadeInUp 0.6s ease-out forwards; opacity: 0; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="pb-20">
    <header class="w-full bg-[#0a0f1a]/80 backdrop-blur-md border-b border-white/5 sticky top-0 z-[999]">
        <div class="max-w-lg mx-auto flex items-center justify-between px-5 py-4">
            <div class="flex items-center gap-3">
                <div class="bg-[#00ce9c] p-2 rounded-lg"><i data-lucide="trending-up" class="w-5 h-5 text-[#0a0f1a]"></i></div>
                <h1 class="outfit text-xl font-bold uppercase text-white">UP<span class="text-[#00ce9c]">CASH</span></h1>
            </div>
            <a href="dashboard.html" class="p-2 bg-white/5 rounded-full text-slate-400 border border-white/10"><i data-lucide="arrow-left" class="w-6 h-6"></i></a>
        </div>
    </header>

    <main id="main-content" class="p-4 max-w-lg mx-auto space-y-6">
        <div class="rounded-3xl p-6 border border-[#00ce9c]/20 animate-reveal" style="background: linear-gradient(135deg, #0c2a23, #0d1321);">
            <p class="text-[#00ce9c]/70 text-xs font-bold uppercase tracking-widest mb-1">Available Balance</p>
            <h3 class="outfit text-4xl font-black text-white" id="availBalance">UGX 0</h3>
        </div>

        <div class="glass-card rounded-[32px] p-6 animate-reveal">
            <label class="block text-slate-400 text-xs font-bold uppercase mb-4 outfit">Amount to Withdraw</label>
            <div class="relative mb-6">
                <span class="absolute left-4 top-1/2 -translate-y-1/2 text-[#00ce9c] font-bold">UGX</span>
                <input type="number" id="withdrawAmount" placeholder="Min 10,000" class="w-full bg-slate-900/50 border border-white/10 rounded-2xl py-4 pl-14 pr-4 text-xl font-bold text-white focus:outline-none focus:border-[#00ce9c]">
            </div>
            <button id="withdrawBtn" onclick="handleWithdraw()" class="w-full py-4 rounded-2xl btn-primary text-lg uppercase flex items-center justify-center gap-2">
                <i data-lucide="wallet" class="w-5 h-5"></i>
                <span id="btnText">Initiate Cash-Out</span>
            </button>
        </div>

        <div class="space-y-4 animate-reveal">
            <h4 class="outfit text-lg font-bold text-white flex items-center gap-2"><i data-lucide="history" class="w-5 h-5 text-[#00ce9c]"></i> History</h4>
            <div class="glass-card rounded-2xl overflow-hidden">
                <table class="w-full text-left text-sm">
                    <tbody id="withdrawTableBody" class="divide-y divide-white/5"></tbody>
                </table>
            </div>
        </div>
    </main>

<script>
    const supabaseClient = supabase.createClient('https://wbodpfbmilhperccgzei.supabase.co', 'sb_publishable_CTQy3-UTfBu_U8kl3lWLXQ_7Ki4gukN');

    async function loadUserData() {
        const { data: { user } } = await supabaseClient.auth.getUser();
        if (!user) return window.location.href = "signin.html";

        const { data: profile } = await supabaseClient.from('userinfo').select('available_balance').eq('userid', user.id).single();
        if (profile) document.getElementById('availBalance').textContent = 'UGX ' + Number(profile.available_balance || 0).toLocaleString();

        const { data: history } = await supabaseClient.from('user_history').select('*').eq('userid', user.id).ilike('category', '%Withdraw%').order('created_at', { ascending: false });
        if (history) {
            document.getElementById('withdrawTableBody').innerHTML = history.map(row => `
                <tr>
                    <td class="p-4"><span class="text-white font-bold text-xs block">${new Date(row.created_at).toLocaleDateString()}</span></td>
                    <td class="p-4 text-right"><span class="font-bold text-red-400 block">UGX ${Math.abs(row.amount).toLocaleString()}</span>
                    <span class="text-[9px] font-bold uppercase text-slate-600">${row.description?.includes('Reinvest') ? 'Reinvested' : 'Mobile Money'}</span></td>
                </tr>`).join('');
        }
        lucide.createIcons();
    }

    async function handleWithdraw() {
        const btnText = document.getElementById('btnText');
        const btn = document.getElementById('withdrawBtn');
        const amount = parseFloat(document.getElementById('withdrawAmount').value);
        
        if (!navigator.onLine) {
            btnText.innerText = "NO INTERNET CONNECTION";
            return;
        }

        if (!amount || amount < 10000) {
            btnText.innerText = "MIN UGX 10,000";
            return setTimeout(() => btnText.innerText = "INITIATE CASH-OUT", 2000);
        }

        btn.disabled = true;
        btnText.innerText = "PROCESSING...";

        try {
            const { data: { user } } = await supabaseClient.auth.getUser();
            
            // Calling the NEW unique function name
            const { data, error } = await supabaseClient.rpc('secure_cashout_v3', { 
                user_id_param: user.id, 
                amount_to_withdraw: amount 
            });

            if (error) throw error;

            if (data?.success) { 
                btnText.innerText = "SUCCESSFUL!";
                setTimeout(() => location.reload(), 1500);
            } else { 
                btnText.innerText = (data?.message || "TRANSACTION DENIED").toUpperCase();
                btn.disabled = false;
                setTimeout(() => btnText.innerText = "INITIATE CASH-OUT", 3000);
            }
        } catch (err) {
            console.error(err);
            btnText.innerText = "DATABASE ERROR";
            btn.disabled = false;
        }
    }
    window.onload = loadUserData;
</script>
</body>
</html>
