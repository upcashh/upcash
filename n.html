<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UPCASH | Secure Withdrawal</title>
    <meta name="theme-color" content="#0a0f1a">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
    <style>
        body { font-family: 'DM Sans', sans-serif; background-color: #0a0f1a; min-height: 100vh; color: #e2e8f0; margin: 0; }
        .outfit { font-family: 'Outfit', sans-serif; }
        .glass-card { background: linear-gradient(160deg, #111827 0%, #0d1321 100%); border: 1px solid rgba(0, 206, 156, 0.15); box-shadow: 0 8px 32px rgba(0,0,0,0.3); }
        .btn-primary { background: #00ce9c; color: #0a0f1a; font-weight: 800; transition: all 0.3s ease; }
        .skeleton { background: rgba(0, 206, 156, 0.05); animation: pulse 1.5s infinite; border-radius: 20px; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        .animate-reveal { animation: fadeInUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; opacity: 0; }
        .delay-1 { animation-delay: 0.1s; }
        .delay-2 { animation-delay: 0.2s; }
    </style>
</head>
<body class="pb-20">
    <header class="w-full bg-[#0a0f1a]/80 backdrop-blur-md border-b border-white/5 sticky top-0 z-[999]">
        <div class="max-w-lg mx-auto flex items-center justify-between px-5 py-4">
            <div class="flex items-center gap-3">
                <div class="bg-[#00ce9c] p-2 rounded-lg"><i data-lucide="trending-up" class="w-5 h-5 text-[#0a0f1a]"></i></div>
                <h1 class="outfit text-xl font-bold uppercase text-white">UP<span style="color: #00ce9c;">CASH</span></h1>
            </div>
            <a href="dashboard.html" class="p-2 bg-white/5 rounded-full text-slate-400 border border-white/10"><i data-lucide="arrow-left" class="w-6 h-6"></i></a>
        </div>
    </header>

    <div id="skeleton-ui" class="p-4 max-w-lg mx-auto space-y-6">
        <div class="h-32 skeleton"></div>
        <div class="h-64 skeleton"></div>
    </div>

    <main id="main-content" class="p-4 max-w-lg mx-auto space-y-6 hidden">
        <div class="rounded-3xl p-6 border border-[#00ce9c]/20 animate-reveal" style="background: linear-gradient(135deg, #0c2a23, #0d1321);">
            <p class="text-[#00ce9c]/70 text-xs font-bold uppercase tracking-widest mb-1">Available Balance</p>
            <h3 class="outfit text-4xl font-black text-white" id="availBalance">UGX 0</h3>
        </div>

        <div class="glass-card rounded-2xl p-4 flex items-center gap-4 animate-reveal delay-1">
            <div class="bg-[#00ce9c]/10 p-3 rounded-xl"><i data-lucide="smartphone" class="w-6 h-6 text-[#00ce9c]"></i></div>
            <div>
                <p class="text-[10px] text-slate-500 uppercase font-bold">Recipient Number</p>
                <p class="outfit font-bold text-lg text-white" id="recipientNum">---</p>
            </div>
        </div>

        <div class="glass-card rounded-[32px] p-6 animate-reveal delay-2">
            <label class="block text-slate-400 text-xs font-bold uppercase mb-4 outfit">Amount to Withdraw</label>
            <div class="relative mb-6">
                <span class="absolute left-4 top-1/2 -translate-y-1/2 text-[#00ce9c] font-bold outfit">UGX</span>
                <input type="number" id="withdrawAmount" placeholder="Min 10,000" class="w-full bg-slate-900/50 border border-white/10 rounded-2xl py-4 pl-14 pr-4 text-xl font-bold text-white focus:outline-none focus:border-[#00ce9c] outfit">
            </div>
            <button id="withdrawBtn" onclick="handleWithdraw()" class="w-full py-4 rounded-2xl btn-primary text-lg uppercase flex items-center justify-center gap-2 active:scale-95 transition-transform">
                <i data-lucide="wallet" class="w-5 h-5"></i>
                <span id="btnText">Initiate Cash-Out</span>
            </button>
        </div>

        <div class="space-y-4 animate-reveal delay-2">
            <h4 class="outfit text-lg font-bold text-white flex items-center gap-2"><i data-lucide="history" class="w-5 h-5 text-[#00ce9c]"></i> History</h4>
            <div class="glass-card rounded-2xl overflow-hidden">
                <table class="w-full text-left text-sm">
                    <thead class="bg-white/5 text-slate-500 text-[10px] uppercase font-bold outfit">
                        <tr><th class="p-4">Details</th><th class="p-4 text-center">Status</th><th class="p-4 text-right">Amount</th></tr>
                    </thead>
                    <tbody id="withdrawTableBody" class="divide-y divide-white/5"></tbody>
                </table>
            </div>
        </div>
    </main>

<script>
    const supabaseClient = supabase.createClient('https://wbodpfbmilhperccgzei.supabase.co', 'sb_publishable_CTQy3-UTfBu_U8kl3lWLXQ_7Ki4gukN');

    async function loadUserData() {
        try {
            const { data: { user } } = await supabaseClient.auth.getUser();
            if (!user) return window.location.href = "signin.html";

            const { data: profile } = await supabaseClient.from('userinfo').select('*').eq('userid', user.id).single();
            if (profile) {
                document.getElementById('availBalance').textContent = 'UGX ' + Number(profile.available_balance || 0).toLocaleString();
                document.getElementById('recipientNum').textContent = profile.telephone || "Not Set";
            }

            const { data: history } = await supabaseClient.from('user_history').select('*').eq('userid', user.id).ilike('category', '%Withdraw%').order('created_at', { ascending: false });
            const tbody = document.getElementById('withdrawTableBody');
            
            if (history && history.length > 0) {
                tbody.innerHTML = history.map(row => {
                    const isReinvest = (row.category?.toLowerCase().includes('reinvest')) || (row.description?.toLowerCase().includes('reinvest'));
                    return `
                    <tr class="hover:bg-white/[0.02]">
                        <td class="p-4"><span class="text-white font-bold text-xs block">${new Date(row.created_at).toLocaleDateString()}</span></td>
                        <td class="p-4 text-center"><span class="px-2 py-1 rounded-full text-[8px] font-black uppercase ${row.status?.toLowerCase() === 'completed' ? 'bg-[#00ce9c]/10 text-[#00ce9c]' : 'bg-amber-500/10 text-amber-500'}">${row.status || 'Pending'}</span></td>
                        <td class="p-4 text-right"><span class="font-bold text-red-400 block">UGX ${Math.abs(row.amount || 0).toLocaleString()}</span>
                        <span class="text-[9px] font-bold uppercase ${isReinvest ? 'text-[#00ce9c]' : 'text-slate-600'}">${isReinvest ? 'Reinvested' : 'Mobile Money'}</span></td>
                    </tr>`;
                }).join('');
            } else {
                tbody.innerHTML = `<tr><td class="p-10 text-center text-slate-500 italic text-xs outfit" colspan="3">No records found.</td></tr>`;
            }
        } finally {
            document.getElementById('skeleton-ui').classList.add('hidden');
            document.getElementById('main-content').classList.remove('hidden');
            lucide.createIcons();
        }
    }

    async function handleWithdraw() {
        const input = document.getElementById('withdrawAmount');
        const btn = document.getElementById('withdrawBtn');
        const btnText = document.getElementById('btnText');
        const amount = parseFloat(input.value);
        
        if (!amount || amount < 10000) {
            btnText.innerText = "MIN UGX 10,000";
            setTimeout(() => btnText.innerText = "INITIATE CASH-OUT", 2000);
            return;
        }

        btn.disabled = true;
        btnText.innerText = "VERIFYING...";

        try {
            const { data: { user } } = await supabaseClient.auth.getUser();
            const { data, error } = await supabaseClient.rpc('withdraw_funds', { 
                user_id_param: user.id, 
                amount_to_withdraw: amount 
            });

            if (data?.success) { 
                btnText.innerText = "SUCCESSFUL!";
                setTimeout(() => location.reload(), 1500);
            } else { 
                btnText.innerText = (data?.message || "ERROR").toUpperCase();
                btn.disabled = false;
                setTimeout(() => btnText.innerText = "INITIATE CASH-OUT", 2500);
            }
        } catch (err) {
            btnText.innerText = "CONNECTION ERROR";
            btn.disabled = false;
        }
    }
    window.onload = loadUserData;
</script>
</body>
  </html>
