<!doctype html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UPCASH - Investment Plans</title>
    <meta name="theme-color" content="#0a0f1a">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'DM Sans', sans-serif; background-color: #0a0f1a; color: #ffffff; margin: 0; }
        
        /* Perspective for 3D Flip */
        .card-container {
            perspective: 1200px;
            height: 220px; /* Reduced size */
        }
        
        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.7s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
        }

        .card-container:hover .card-inner {
            transform: rotateY(180deg);
        }

        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            -webkit-backface-visibility: hidden;
            backface-visibility: hidden;
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(255, 255, 255, 0.08);
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
        }

        .card-back {
            transform: rotateY(180deg);
            padding: 15px;
            text-align: center;
        }

        /* Silver Popular Glow */
        .popular-border {
            border: 1px solid rgba(0, 206, 156, 0.4) !important;
            box-shadow: 0 0 15px rgba(0, 206, 156, 0.1);
        }

        .shimmer {
            background: linear-gradient(110deg, transparent 30%, rgba(0,206,156,0.1) 50%, transparent 70%);
            background-size: 200% 100%;
            animation: shimmer 3s infinite;
        }

        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

        .icon-box {
            background: #00ce9c;
            border-radius: 12px;
            padding: 8px;
            box-shadow: 0 0 15px rgba(0, 206, 156, 0.3);
        }

        .btn-purchase {
            background: #00ce9c;
            color: #0a0f1a;
            font-weight: 700;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 12px;
            margin-top: 8px;
            transition: 0.3s;
        }

        .btn-purchase:hover { transform: scale(1.05); }
    </style>
</head>
<body class="h-full">

    <div class="max-w-md mx-auto px-4 py-6">
        <header class="flex items-center justify-between mb-8">
            <a href="dashboard.html" class="p-2 rounded-full bg-white/5 border border-white/10 text-white">
                <i data-lucide="arrow-left" class="w-5 h-5"></i>
            </a>
            <div class="flex items-center gap-2">
                <div class="bg-[#00ce9c] p-1.5 rounded-lg shadow-[0_0_10px_rgba(0,206,156,0.4)]">
                    <i data-lucide="trending-up" class="w-5 h-5 text-[#0a0f1a] stroke-[3px]"></i>
                </div>
                <h1 class="text-2xl font-black tracking-tighter uppercase font-['Outfit']">
                    UP<span class="text-[#00ce9c]">CASH</span>
                </h1>
            </div>
            <div class="w-9"></div> </header>

        <p class="text-center text-[#00ce9c] font-['Outfit'] tracking-[2px] text-sm mb-8 uppercase font-light">Select Investment Plan</p>

        <div class="grid grid-cols-2 gap-4">
            
            <div class="card-container">
                <div class="card-inner">
                    <div class="card-front">
                        <i data-lucide="zap" class="w-10 h-10 text-[#00ce9c] mb-2"></i>
                        <span class="text-xs font-bold tracking-widest text-[#00ce9c]">BASIC</span>
                    </div>
                    <div class="card-back">
                        <p class="text-[10px] text-gray-400">Min: UGX 10,000</p>
                        <p class="text-sm font-bold text-white my-1">8% Daily</p>
                        <p class="text-[10px] text-gray-400">40 Days</p>
                        <a href="basic.html" class="btn-purchase">Purchase</a>
                    </div>
                </div>
            </div>

            <div class="card-container">
                <div class="card-inner">
                    <div class="card-front popular-border shimmer">
                        <div class="absolute top-2 right-2 bg-[#00ce9c] text-[#0a0f1a] text-[8px] font-black px-1.5 py-0.5 rounded">POPULAR</div>
                        <i data-lucide="shield" class="w-10 h-10 text-[#00ce9c] mb-2"></i>
                        <span class="text-xs font-bold tracking-widest text-[#00ce9c]">SILVER</span>
                    </div>
                    <div class="card-back popular-border">
                        <p class="text-[10px] text-gray-400">Min: UGX 108,000</p>
                        <p class="text-sm font-bold text-white my-1">10% Daily</p>
                        <p class="text-[10px] text-gray-400">30 Days</p>
                        <a href="silver.html" class="btn-purchase">Purchase</a>
                    </div>
                </div>
            </div>

            <div class="card-container">
                <div class="card-inner">
                    <div class="card-front">
                        <i data-lucide="award" class="w-10 h-10 text-yellow-400 mb-2"></i>
                        <span class="text-xs font-bold tracking-widest text-yellow-400">GOLD</span>
                    </div>
                    <div class="card-back">
                        <p class="text-[10px] text-gray-400">Min: UGX 525,000</p>
                        <p class="text-sm font-bold text-white my-1">12% Daily</p>
                        <p class="text-[10px] text-gray-400">25 Days</p>
                        <a href="gold.html" class="btn-purchase">Purchase</a>
                    </div>
                </div>
            </div>

            <div class="card-container">
                <div class="card-inner">
                    <div class="card-front">
                        <i data-lucide="gem" class="w-10 h-10 text-blue-400 mb-2"></i>
                        <span class="text-xs font-bold tracking-widest text-blue-400">DIAMOND</span>
                    </div>
                    <div class="card-back">
                        <p class="text-[10px] text-gray-400">Min: UGX 1,215,000</p>
                        <p class="text-sm font-bold text-white my-1">14% Daily</p>
                        <p class="text-[10px] text-gray-400">21 Days</p>
                        <a href="diamond.html" class="btn-purchase">Purchase</a>
                    </div>
                </div>
            </div>

        </div>

        <footer class="mt-12 text-center">
            <p class="text-gray-500 text-[10px] uppercase tracking-widest">Secure Multi-tier Platform</p>
            <div class="flex justify-center gap-4 mt-4 opacity-40">
                <i data-lucide="shield-check" class="w-4 h-4"></i>
                <i data-lucide="lock" class="w-4 h-4"></i>
                <i data-lucide="globe" class="w-4 h-4"></i>
            </div>
        </footer>
    </div>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
