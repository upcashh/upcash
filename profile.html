<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0a0f1a">
    <title>My Profile | UPCASH</title>
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body { 
            font-family: 'DM Sans', sans-serif; 
            background-color: #0a0f1a;
            color: #e2e8f0; 
            min-height: 100vh;
            margin: 0;
            -webkit-font-smoothing: antialiased; 
        }

        .outfit { font-family: 'Outfit', sans-serif; }
        
        .glass-card { 
            background: linear-gradient(160deg, #111827 0%, #0d1321 100%); 
            border: 1px solid rgba(0, 206, 156, 0.15);
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }

        .icon-box {
            background: #00ce9c;
            border-radius: 12px;
            padding: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 20px rgba(0, 206, 156, 0.4);
        }

        /* Skeleton Animation */
        .skeleton { background: rgba(0, 206, 156, 0.05); overflow: hidden; position: relative; }
        .skeleton::after {
            content: ""; position: absolute; top: 0; right: 0; bottom: 0; left: 0;
            transform: translateX(-100%);
            background: linear-gradient(90deg, transparent, rgba(0, 206, 156, 0.1), transparent);
            animation: shimmer 1.5s infinite;
        }
        @keyframes shimmer { 100% { transform: translateX(100%); } }

        /* Glowing Status Dots */
        .dot { height: 8px; width: 8px; border-radius: 50%; display: inline-block; margin-right: 6px; }
        .dot-running { background-color: #00ce9c; box-shadow: 0 0 10px #00ce9c; }
        .dot-stopped { background-color: #ef4444; box-shadow: 0 0 10px #ef4444; animation: pulse-red 2s infinite; }
        
        @keyframes pulse-red {
            0% { opacity: 1; }
            50% { opacity: 0.4; }
            100% { opacity: 1; }
        }

        .action-btn { transition: all 0.2s; background: #00ce9c; color: #0a0f1a; box-shadow: 0 10px 20px rgba(0,206,156,0.2); }
        .action-btn:active { transform: scale(0.96); }

        table { width: 100%; border-collapse: separate; border-spacing: 0 8px; }
        th { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: #5a6477; padding: 10px; text-align: left; }
        td { padding: 12px 10px; font-size: 13px; background: rgba(255,255,255,0.02); }
        td:first-child { border-radius: 12px 0 0 12px; }
        td:last-child { border-radius: 0 12px 12px 0; }
    </style>
</head>
<body>

    <div style="position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;overflow:hidden;z-index:0;">
        <div style="position:absolute;top:-20%;right:-15%;width:500px;height:500px;border-radius:50%;background:radial-gradient(circle,rgba(0,206,156,0.08) 0%,transparent 70%);"></div>
        <div style="position:absolute;bottom:-10%;left:-10%;width:400px;height:400px;border-radius:50%;background:radial-gradient(circle,rgba(0,206,156,0.05) 0%,transparent 70%);"></div>
    </div>

    <header class="flex items-center justify-between p-5 sticky top-0 bg-[#0a0f1a]/80 backdrop-blur-md z-50 border-b border-white/5">
        <div class="flex items-center gap-3">
            <div class="icon-box">
                <i data-lucide="trending-up" class="w-5 h-5 text-[#0a0f1a]" style="stroke-width: 3px;"></i>
            </div>
            <h1 class="outfit text-xl font-extrabold tracking-tighter text-white uppercase">UP<span style="color: #00ce9c;">CASH</span></h1>
        </div>
        <a href="dashboard.html" class="p-2 bg-white/5 hover:bg-white/10 rounded-full transition-all border border-white/10">
            <i data-lucide="arrow-left" class="w-6 h-6 text-slate-300"></i>
        </a>
    </header>

    <main class="relative z-10 p-5 max-w-lg mx-auto space-y-6">
        
        <div id="profile-content" class="hidden space-y-6">
            <div class="text-center py-4">
                <div class="w-24 h-24 glass-card rounded-3xl mx-auto mb-4 flex items-center justify-center border-[#00ce9c]/30">
                    <i data-lucide="user" class="w-12 h-12 text-[#00ce9c]" style="stroke-width: 1.5px;"></i>
                </div>
                <h2 id="user-display" class="outfit text-2xl font-black text-white tracking-tight">Loading...</h2>
                <p id="plan" class="text-[#00ce9c] text-xs font-bold uppercase tracking-widest mt-1">Standard Member</p>
            </div>

            <div class="grid grid-cols-1 gap-3">
                <div class="glass-card p-4 rounded-2xl flex items-center gap-4">
                    <div class="p-2 bg-[#00ce9c]/10 rounded-lg text-[#00ce9c]">
                        <i data-lucide="phone" class="w-5 h-5"></i>
                    </div>
                    <div>
                        <p class="text-[10px] text-slate-500 font-bold uppercase">Telephone</p>
                        <p id="phone" class="text-sm font-bold text-slate-200">-</p>
                    </div>
                </div>

                <div class="glass-card p-4 rounded-2xl flex items-center gap-4">
                    <div class="p-2 bg-[#00ce9c]/10 rounded-lg text-[#00ce9c]">
                        <i data-lucide="mail" class="w-5 h-5"></i>
                    </div>
                    <div>
                        <p class="text-[10px] text-slate-500 font-bold uppercase">Email Address</p>
                        <p id="email" class="text-sm font-bold text-slate-200">-</p>
                    </div>
                </div>

                <div class="glass-card p-4 rounded-2xl flex items-center gap-4">
                    <div class="p-2 bg-[#00ce9c]/10 rounded-lg text-[#00ce9c]">
                        <i data-lucide="calendar" class="w-5 h-5"></i>
                    </div>
                    <div>
                        <p class="text-[10px] text-slate-500 font-bold uppercase">Registration Date</p>
                        <p id="joined" class="text-sm font-bold text-slate-200">-</p>
                    </div>
                </div>
            </div>

            <div class="pt-4">
                <div class="flex items-center gap-2 mb-4">
                    <div class="icon-box" style="padding: 6px; box-shadow: none;">
                        <i data-lucide="zap" class="w-4 h-4 text-[#0a0f1a]"></i>
                    </div>
                    <h3 class="outfit text-sm font-black uppercase tracking-widest text-white">My Running Plans</h3>
                </div>
                
                <div class="overflow-x-auto">
                    <table>
                        <thead>
                            <tr>
                                <th>Plan</th>
                                <th>Investment</th>
                                <th>Status</th>
                                <th>Days Left</th>
                            </tr>
                        </thead>
                        <tbody id="plans-table-body">
                        </tbody>
                    </table>
                </div>
            </div>

            <a href="affiliates.html" class="action-btn w-full py-4 rounded-2xl font-bold flex items-center justify-center gap-2 outfit">
                <i data-lucide="users" class="w-5 h-5"></i>
                My Affiliates Network
            </a>
        </div>

        <div id="skeleton-view" class="space-y-6">
            <div class="text-center py-4">
                <div class="w-24 h-24 skeleton rounded-3xl mx-auto mb-4"></div>
                <div class="h-6 w-32 skeleton rounded mx-auto"></div>
            </div>
            <div class="space-y-3">
                <div class="h-20 w-full skeleton rounded-2xl"></div>
                <div class="h-20 w-full skeleton rounded-2xl"></div>
                <div class="h-20 w-full skeleton rounded-2xl"></div>
            </div>
            <div class="h-40 w-full skeleton rounded-2xl"></div>
        </div>

        <footer class="text-center pb-10">
            <p class="outfit text-[10px] font-bold text-slate-600 tracking-widest uppercase">&copy; UPCASH BUSINESS PLATFORM 2026</p>
        </footer>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        lucide.createIcons();
        const supabaseClient = supabase.createClient('https://wbodpfbmilhperccgzei.supabase.co', 'sb_publishable_CTQy3-UTfBu_U8kl3lWLXQ_7Ki4gukN');

        async function loadProfile() {
            const { data: { user } } = await supabaseClient.auth.getUser();
            if (user) {
                const { data: p } = await supabaseClient.from('userinfo').select('*').eq('userid', user.id).single();
                const { data: plans } = await supabaseClient.from('investments').select('plan_name, amount, remaining_days, status').eq('userid', user.id);

                if (p) {
                    document.getElementById('user-display').innerText = p.username;
                    document.getElementById('phone').innerText = p.telephone || 'Not set';
                    document.getElementById('email').innerText = user.email;
                    document.getElementById('joined').innerText = new Date(user.created_at).toLocaleDateString('en-GB');
                    document.getElementById('plan').innerText = p.plan || 'Standard Member';
                    
                    const tableBody = document.getElementById('plans-table-body');
                    tableBody.innerHTML = '';

                    if (plans && plans.length > 0) {
                        plans.forEach(plan => {
                            const isActive = plan.status === 'active';
                            const statusDotClass = isActive ? 'dot-running' : 'dot-stopped';
                            
                            tableBody.innerHTML += `
                                <tr>
                                    <td class="font-bold text-white">${plan.plan_name}</td>
                                    <td class="text-slate-400">UGX ${Number(plan.amount).toLocaleString()}</td>
                                    <td>
                                        <div class="flex items-center">
                                            <span class="dot ${statusDotClass}"></span>
                                            <span class="text-[10px] uppercase font-bold ${isActive ? 'text-[#00ce9c]' : 'text-red-400'}">${plan.status}</span>
                                        </div>
                                    </td>
                                    <td class="font-bold text-slate-300">
                                        ${plan.remaining_days} Days
                                    </td>
                                </tr>
                            `;
                        });
                    } else {
                        tableBody.innerHTML = '<tr><td colspan="4" class="text-center text-slate-500 py-10">No investment plans found.</td></tr>';
                    }

                    document.getElementById('skeleton-view').classList.add('hidden');
                    document.getElementById('profile-content').classList.remove('hidden');
                }
            }
        }

        loadProfile();
    </script>
</body>
                    </html>
