<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0f172a">
    <title>UPCASH | Secure Withdrawal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: radial-gradient(circle at top left, #1e293b, #0f172a); 
            min-height: 100vh; 
            color: #e2e8f0; 
            margin: 0; 
            padding: 0; 
            -webkit-font-smoothing: antialiased;
        }
        .glass-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .btn-gradient { background: linear-gradient(135deg, #3b82f6, #8b5cf6); border: none; color: white; }
        .text-gradient { background: linear-gradient(90deg, #60a5fa, #a855f7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        input::placeholder { color: rgba(148, 163, 184, 0.4); }
        header { min-height: 70px; }
        
        /* Skeleton Animation */
        .skeleton { background: rgba(255, 255, 255, 0.05); animation: pulse 1.5s infinite; border-radius: 8px; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    </style>
</head>
<body class="pb-20">

    <header class="w-full bg-slate-900/90 backdrop-blur-md border-b border-white/10 sticky top-0 z-[999]">
        <div class="max-w-lg mx-auto h-full flex items-center justify-between px-5 py-4">
            <div class="flex items-center gap-3">
                <div class="bg-blue-600 p-2 rounded-lg flex-shrink-0">
                    <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"></path>
                    </svg>
                </div>
                <h1 class="text-xl font-bold tracking-tight">UP<span class="text-blue-500">CASH</span></h1>
            </div>
            <a href="dashboard.html" class="p-2 bg-white/5 hover:bg-white/10 rounded-full text-slate-300 transition-all border border-white/5">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
            </a>
        </div>
    </header>

    <div id="skeleton-ui" class="p-4 max-w-lg mx-auto space-y-6">
        <div class="rounded-3xl p-6 h-28 skeleton"></div>
        <div class="rounded-2xl p-4 h-20 skeleton"></div>
        <div class="rounded-3xl p-6 h-48 skeleton"></div>
    </div>

    <main id="main-content" class="p-4 max-w-lg mx-auto space-y-6 hidden">

        <div class="rounded-3xl p-6 shadow-2xl border border-white/10" style="background: linear-gradient(135deg, #1e3a8a, #581c87);">
            <p class="text-blue-200/70 text-sm font-medium mb-1">Available Balance</p>
            <h3 class="text-3xl font-black text-gradient" id="availBalance">UGX 0</h3>
        </div>

        <div class="glass-card rounded-2xl p-4 flex items-center gap-4 border-white/10">
            <div class="bg-blue-500/20 p-3 rounded-xl">
                <svg class="w-6 h-6 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"></path></svg>
            </div>
            <div>
                <p class="text-xs text-slate-400 uppercase tracking-widest">Recipient Number</p>
                <p class="font-bold text-lg text-white" id="recipientNum">Loading...</p>
            </div>
        </div>

        <div class="glass-card rounded-3xl p-6 border-white/10">
            <label class="block text-slate-400 text-sm font-medium mb-4">
                Minimum withdraw is <span class="text-gradient font-bold">UGX 10,000</span>
            </label>
            <div class="relative mb-6">
                <input type="number" id="withdrawAmount" placeholder="Enter amount" class="w-full bg-white/5 border border-white/10 rounded-xl py-4 px-4 text-xl font-bold text-white focus:outline-none focus:border-blue-500 transition">
            </div>
            <button id="withdrawBtn" onclick="handleWithdraw()" class="w-full py-4 rounded-xl btn-gradient font-black text-lg shadow-lg active:scale-95 transition flex items-center justify-center gap-2">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 9V7a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2m2 4h10a2 2 0 002-2v-6a2 2 0 00-2-2H9a2 2 0 00-2 2v6a2 2 0 002 2zm7-5a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
                WITHDRAW
            </button>
        </div>

        <div class="space-y-4">
            <h4 class="text-lg font-bold flex items-center gap-2 text-gradient">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"></path></svg>
                Recent Withdrawals
            </h4>
            <div class="glass-card rounded-2xl overflow-hidden border-white/10">
                <table class="w-full text-left text-sm border-collapse">
                    <thead class="bg-white/5 text-slate-400 text-[10px] uppercase tracking-widest">
                        <tr><th class="p-4">Date & Time</th><th class="p-4 text-right">Amount</th></tr>
                    </thead>
                    <tbody id="withdrawTableBody" class="divide-y divide-white/5">
                        <tr><td class="p-4 py-8 text-center text-slate-500 italic" colspan="2">No records found.</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>
    
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    const supabaseClient = supabase.createClient('https://wbodpfbmilhperccgzei.supabase.co', 'sb_publishable_CTQy3-UTfBu_U8kl3lWLXQ_7Ki4gukN');

    async function loadUserData() {
        const { data: { user } } = await supabaseClient.auth.getUser();
        if (!user) return;

        // Fetch user balance and info
        const { data: profile } = await supabaseClient
            .from('userinfo')
            .select('available_balance, telephone')
            .eq('userid', user.id)
            .single();

        if (profile) {
            document.getElementById('availBalance').textContent = 'UGX ' + profile.available_balance.toLocaleString();
            document.getElementById('recipientNum').textContent = profile.telephone;
        }

        // Fetch last 5 withdrawals
        const { data: history } = await supabaseClient
            .from('user_history')
            .select('created_at, amount')
            .eq('userid', user.id)
            .ilike('category', '%withdraw%')
            .order('created_at', { ascending: false })
            .limit(5);

        if (history && history.length > 0) {
            const tbody = document.getElementById('withdrawTableBody');
            tbody.innerHTML = history.map(row => `
                <tr class="hover:bg-white/[0.02]">
                    <td class="p-4 text-slate-300">
                        ${new Date(row.created_at).toLocaleDateString()} <br>
                        <span class="text-[10px] text-slate-500 font-mono">${new Date(row.created_at).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</span>
                    </td>
                    <td class="p-4 text-right font-bold text-red-400">
                        UGX ${Math.abs(row.amount).toLocaleString()}
                    </td>
                </tr>
            `).join('');
        }

        // Swap UI
        document.getElementById('skeleton-ui').classList.add('hidden');
        document.getElementById('main-content').classList.remove('hidden');
    }

    async function handleWithdraw() {
        const input = document.getElementById('withdrawAmount');
        const btn = document.getElementById('withdrawBtn');
        const amount = parseFloat(input.value);
        
        if (!amount || amount < 10000) return alert("Minimum withdrawal is UGX 10,000");

        const confirmCheck = confirm(`Confirm withdrawal of UGX ${amount.toLocaleString()} to ${document.getElementById('recipientNum').textContent}?`);
        if(!confirmCheck) return;

        btn.disabled = true;
        btn.innerText = "PROCESSING...";

        const { data: { user } } = await supabaseClient.auth.getUser();
        const { data, error } = await supabaseClient.rpc('withdraw_funds', { 
            user_id_param: user.id, 
            amount_to_withdraw: amount 
        });

        if (data?.success) { 
            alert("Success: " + data.message); 
            location.reload(); 
        } else { 
            alert("Failed: " + (data?.message || "Internal Error")); 
            btn.disabled = false;
            btn.innerText = "WITHDRAW";
        }
    }

    loadUserData();
</script>
</body>
</html>
