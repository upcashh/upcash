<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UPCASH | Secure Withdrawal</title>
    
    <meta name="theme-color" content="#0a0f1a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
    
    <style>
        body { 
            font-family: 'DM Sans', sans-serif; 
            background-color: #0a0f1a;
            min-height: 100vh; 
            color: #e2e8f0; 
            -webkit-font-smoothing: antialiased;
        }
        .outfit { font-family: 'Outfit', sans-serif; }

        .glass-card { 
            background: linear-gradient(160deg, #111827 0%, #0d1321 100%); 
            border: 1px solid rgba(0, 206, 156, 0.15);
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }

        .icon-box {
            background: #00ce9c;
            border-radius: 12px;
            padding: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 20px rgba(0, 206, 156, 0.4);
        }

        .btn-primary { 
            background: #00ce9c; 
            color: #0a0f1a; 
            transition: all 0.3s ease; 
            box-shadow: 0 10px 20px rgba(0,206,156,0.2);
        }
        
        .badge-pending { background: rgba(245, 158, 11, 0.1); color: #fbbf24; border: 1px solid rgba(245, 158, 11, 0.2); }
        .badge-completed { background: rgba(0, 206, 156, 0.1); color: #00ce9c; border: 1px solid rgba(0, 206, 156, 0.2); }

        .skeleton { background: rgba(0, 206, 156, 0.05); animation: pulse 1.5s infinite; border-radius: 12px; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body class="pb-20">

    <div style="position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;overflow:hidden;z-index:0;">
        <div style="position:absolute;top:-20%;right:-15%;width:500px;height:500px;border-radius:50%;background:radial-gradient(circle,rgba(0,206,156,0.08) 0%,transparent 70%);"></div>
        <div style="position:absolute;bottom:-10%;left:-10%;width:400px;height:400px;border-radius:50%;background:radial-gradient(circle,rgba(0,206,156,0.05) 0%,transparent 70%);"></div>
    </div>

    <header class="w-full bg-[#0a0f1a]/80 backdrop-blur-md border-b border-white/5 sticky top-0 z-[999]">
        <div class="max-w-lg mx-auto flex items-center justify-between px-5 py-4">
            <div class="flex items-center gap-3">
                <div class="icon-box">
                    <i data-lucide="trending-up" class="w-5 h-5 text-[#0a0f1a]" style="stroke-width: 3px;"></i>
                </div>
                <h1 class="outfit text-xl font-bold tracking-tight uppercase text-white">UP<span style="color: #00ce9c;">CASH</span></h1>
            </div>
            <a href="dashboard.html" class="p-2 bg-white/5 rounded-full text-slate-400 border border-white/10">
                <i data-lucide="arrow-left" class="w-6 h-6"></i>
            </a>
        </div>
    </header>

    <div id="skeleton-ui" class="p-4 max-w-lg mx-auto space-y-6">
        <div class="h-32 skeleton"></div>
        <div class="h-20 skeleton"></div>
        <div class="h-56 skeleton"></div>
    </div>

    <main id="main-content" class="relative z-10 p-4 max-w-lg mx-auto space-y-6 hidden">
        <div class="rounded-3xl p-6 shadow-2xl border border-[#00ce9c]/20" style="background: linear-gradient(135deg, #0c2a23, #0d1321);">
            <p class="text-[#00ce9c]/70 text-sm font-medium mb-1 outfit tracking-wider uppercase">Available for Cash-out</p>
            <h3 class="outfit text-4xl font-black text-white" id="availBalance">UGX 0</h3>
        </div>

        <div class="glass-card rounded-2xl p-4 flex items-center gap-4 border-white/10">
            <div class="bg-[#00ce9c]/10 p-3 rounded-xl">
                <i data-lucide="smartphone" class="w-6 h-6 text-[#00ce9c]"></i>
            </div>
            <div>
                <p class="text-[10px] text-slate-500 uppercase tracking-widest font-bold">Recipient Number</p>
                <p class="outfit font-bold text-lg text-white" id="recipientNum">---</p>
            </div>
        </div>

        <div class="glass-card rounded-3xl p-6 border-white/10">
            <label class="block text-slate-400 text-xs font-bold uppercase tracking-wider mb-4 outfit">Amount to Withdraw</label>
            <div class="relative mb-6">
                <span class="absolute left-4 top-1/2 -translate-y-1/2 text-[#00ce9c] font-bold outfit">UGX</span>
                <input type="number" id="withdrawAmount" placeholder="Min 10,000" class="w-full bg-slate-900/50 border border-white/10 rounded-xl py-4 pl-14 pr-4 text-xl font-bold text-white focus:outline-none focus:border-[#00ce9c] transition outfit">
            </div>
            <button id="withdrawBtn" onclick="handleWithdraw()" class="w-full py-4 rounded-xl btn-primary font-black text-lg shadow-xl active:scale-95 transition flex items-center justify-center gap-2 outfit uppercase">
                <i data-lucide="wallet" class="w-5 h-5"></i>
                Initiate Cash-Out
            </button>
        </div>

        <div class="space-y-4">
            <h4 class="outfit text-lg font-bold flex items-center gap-2 text-white">
                <i data-lucide="history" class="w-5 h-5 text-[#00ce9c]"></i>
                Withdrawal History
            </h4>
            <div class="glass-card rounded-2xl overflow-hidden border-white/10">
                <table class="w-full text-left text-sm">
                    <thead class="bg-white/5 text-slate-500 text-[10px] uppercase tracking-widest font-bold outfit">
                        <tr>
                            <th class="p-4">Details</th>
                            <th class="p-4 text-center">Status</th>
                            <th class="p-4 text-right">Amount</th>
                        </tr>
                    </thead>
                    <tbody id="withdrawTableBody" class="divide-y divide-white/5">
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <footer class="mt-8 text-center pb-10">
        <p class="outfit text-[10px] font-bold text-slate-600 tracking-widest uppercase">© UPCASH BUSINESS PLATFORM 2026</p>
    </footer>
    
<script>
    lucide.createIcons();
    const supabaseClient = supabase.createClient('https://wbodpfbmilhperccgzei.supabase.co', 'sb_publishable_CTQy3-UTfBu_U8kl3lWLXQ_7Ki4gukN');

    async function loadUserData() {
        try {
            const { data: { user } } = await supabaseClient.auth.getUser();
            if (!user) {
                window.location.href = "signin.html";
                return;
            }

            const { data: profile } = await supabaseClient
                .from('userinfo')
                .select('available_balance, telephone')
                .eq('userid', user.id)
                .single();

            if (profile) {
                document.getElementById('availBalance').textContent = 'UGX ' + Number(profile.available_balance).toLocaleString();
                document.getElementById('recipientNum').textContent = profile.telephone;
            }

            const { data: history } = await supabaseClient
                .from('user_history')
                .select('created_at, amount, status, category')
                .eq('userid', user.id)
                .ilike('category', 'Withdraw') 
                .order('created_at', { ascending: false });

            const tbody = document.getElementById('withdrawTableBody');
            
            if (history && history.length > 0) {
                tbody.innerHTML = history.map(row => {
                    const statusStr = row.status ? row.status.toLowerCase() : 'pending';
                    const statusClass = statusStr === 'completed' ? 'badge-completed' : 'badge-pending';
                    const amt = row.amount ? Math.abs(row.amount) : 0;

                    return `
                    <tr class="hover:bg-white/[0.02]">
                        <td class="p-4">
                            <span class="text-white font-semibold text-xs block outfit">${new Date(row.created_at).toLocaleDateString()}</span>
                            <span class="text-[9px] text-slate-500 uppercase font-mono">${new Date(row.created_at).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</span>
                        </td>
                        <td class="p-4 text-center">
                            <span class="px-2 py-1 rounded-full text-[8px] font-black uppercase ${statusClass} outfit">
                                ${row.status || 'Processing'}
                            </span>
                        </td>
                        <td class="p-4 text-right">
                            <span class="font-bold text-red-400 block outfit">UGX ${amt.toLocaleString()}</span>
                            <span class="text-[9px] text-slate-600">Mobile Money</span>
                        </td>
                    </tr>`;
                }).join('');
            } else {
                tbody.innerHTML = `<tr><td class="p-10 text-center text-slate-500 italic text-xs outfit" colspan="3">No records found.</td></tr>`;
            }

        } catch (err) {
            console.error("Load Error:", err);
        } finally {
            document.getElementById('skeleton-ui').classList.add('hidden');
            document.getElementById('main-content').classList.remove('hidden');
        }
    }

    async function handleWithdraw() {
        const input = document.getElementById('withdrawAmount');
        const btn = document.getElementById('withdrawBtn');
        const amount = parseFloat(input.value);
        
        if (!amount || amount < 10000) return alert("Minimum withdrawal is UGX 10,000");

        btn.disabled = true;
        btn.innerHTML = `PROCESSING...`;

        const { data: { user } } = await supabaseClient.auth.getUser();
        const { data, error } = await supabaseClient.rpc('withdraw_funds', { 
            user_id_param: user.id, 
            amount_to_withdraw: amount 
        });

        if (data?.success) { 
            alert("Withdrawal request successful!"); 
            location.reload(); 
        } else { 
            alert("Request Failed: " + (data?.message || "Check your balance.")); 
            btn.disabled = false;
            btn.innerText = "INITIATE CASH-OUT";
        }
    }

    window.onload = loadUserData;
</script>
</body>
    </html>
