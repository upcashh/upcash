<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile | UPCASH</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background: radial-gradient(circle at top left, #1e293b, #0f172a); 
            color: #e2e8f0; 
            min-height: 100vh;
            margin: 0;
            -webkit-font-smoothing: antialiased; 
        }
        
        .glass-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .text-gradient { background: linear-gradient(90deg, #60a5fa, #a855f7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        /* Skeleton Animation */
        .skeleton { background: rgba(255, 255, 255, 0.05); overflow: hidden; position: relative; }
        .skeleton::after {
            content: ""; position: absolute; top: 0; right: 0; bottom: 0; left: 0;
            transform: translateX(-100%);
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent);
            animation: shimmer 1.5s infinite;
        }
        @keyframes shimmer { 100% { transform: translateX(100%); } }

        /* Glowing Status Dots */
        .dot { height: 8px; width: 8px; border-radius: 50%; display: inline-block; margin-right: 6px; }
        .dot-running { background-color: #22c55e; box-shadow: 0 0 10px #22c55e; }
        .dot-stopped { background-color: #ef4444; box-shadow: 0 0 10px #ef4444; animation: pulse-red 2s infinite; }
        
        @keyframes pulse-red {
            0% { opacity: 1; }
            50% { opacity: 0.4; }
            100% { opacity: 1; }
        }

        .action-btn { transition: all 0.2s; }
        .action-btn:active { transform: scale(0.96); }

        table { width: 100%; border-collapse: separate; border-spacing: 0 8px; }
        th { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: #94a3b8; padding: 10px; text-align: left; }
        td { padding: 12px 10px; font-size: 13px; background: rgba(255,255,255,0.02); }
        td:first-child { border-radius: 12px 0 0 12px; }
        td:last-child { border-radius: 0 12px 12px 0; }
    </style>
</head>
<body>

    <header class="flex items-center justify-between p-5 sticky top-0 bg-[#0f172a]/80 backdrop-blur-md z-50 border-b border-white/5">
        <div class="flex items-center gap-3">
            <div class="bg-blue-600 p-2 rounded-lg shadow-lg shadow-blue-500/20">
                <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"></path></svg>
            </div>
            <h1 class="text-xl font-extrabold tracking-tighter text-white">UP<span class="text-blue-500">CASH</span></h1>
        </div>
        <a href="dashboard.html" class="p-2 bg-white/5 hover:bg-white/10 rounded-full transition-all border border-white/10">
            <svg class="w-6 h-6 text-slate-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
        </a>
    </header>

    <main class="p-5 max-w-lg mx-auto space-y-6">
        
        <div id="profile-content" class="hidden space-y-6">
            <div class="text-center py-4">
                <div class="w-24 h-24 glass-card rounded-3xl mx-auto mb-4 flex items-center justify-center border-blue-500/30">
                    <svg class="w-12 h-12 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                </div>
                <h2 id="user-display" class="text-2xl font-black text-white tracking-tight">Loading...</h2>
                <p id="plan" class="text-blue-400 text-xs font-bold uppercase tracking-widest mt-1">Standard Member</p>
            </div>

            <div class="grid grid-cols-1 gap-3">
                <div class="glass-card p-4 rounded-2xl flex items-center gap-4">
                    <div class="p-2 bg-blue-500/10 rounded-lg text-blue-400">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"></path></svg>
                    </div>
                    <div>
                        <p class="text-[10px] text-slate-500 font-bold uppercase">Telephone</p>
                        <p id="phone" class="text-sm font-bold text-slate-200">-</p>
                    </div>
                </div>

                <div class="glass-card p-4 rounded-2xl flex items-center gap-4">
                    <div class="p-2 bg-purple-500/10 rounded-lg text-purple-400">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
                    </div>
                    <div>
                        <p class="text-[10px] text-slate-500 font-bold uppercase">Email Address</p>
                        <p id="email" class="text-sm font-bold text-slate-200">-</p>
                    </div>
                </div>

                <div class="glass-card p-4 rounded-2xl flex items-center gap-4">
                    <div class="p-2 bg-emerald-500/10 rounded-lg text-emerald-400">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
                    </div>
                    <div>
                        <p class="text-[10px] text-slate-500 font-bold uppercase">Registration Date</p>
                        <p id="joined" class="text-sm font-bold text-slate-200">-</p>
                    </div>
                </div>
            </div>

            <div class="pt-4">
                <div class="flex items-center gap-2 mb-4">
                    <div class="p-2 bg-orange-500/20 rounded-lg border border-orange-500/30 shadow-[0_0_10px_rgba(249,115,22,0.1)]">
                        <svg class="w-4 h-4 text-orange-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                    </div>
                    <h3 class="text-sm font-black uppercase tracking-widest text-white">My Running Plans</h3>
                </div>
                
                <div class="overflow-x-auto">
                    <table>
                        <thead>
                            <tr>
                                <th>Plan</th>
                                <th>Investment</th>
                                <th>Status</th>
                                <th>Days Left</th>
                            </tr>
                        </thead>
                        <tbody id="plans-table-body">
                            </tbody>
                    </table>
                </div>
            </div>

            <a href="affiliates.html" class="action-btn w-full py-4 bg-gradient-to-r from-blue-600 to-purple-600 rounded-2xl font-bold text-white shadow-lg flex items-center justify-center gap-2">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
                My Affiliates Network
            </a>
        </div>

        <div id="skeleton-view" class="space-y-6">
            <div class="text-center py-4">
                <div class="w-24 h-24 skeleton rounded-3xl mx-auto mb-4"></div>
                <div class="h-6 w-32 skeleton rounded mx-auto"></div>
            </div>
            <div class="space-y-3">
                <div class="h-20 w-full skeleton rounded-2xl"></div>
                <div class="h-20 w-full skeleton rounded-2xl"></div>
                <div class="h-20 w-full skeleton rounded-2xl"></div>
            </div>
            <div class="h-40 w-full skeleton rounded-2xl"></div>
        </div>

        <footer class="text-center pb-10">
            <p class="text-[10px] font-bold text-slate-600 tracking-widest uppercase">&copy; UPCASH BUSINESS PLATFORM 2026</p>
        </footer>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const supabaseClient = supabase.createClient('https://wbodpfbmilhperccgzei.supabase.co', 'sb_publishable_CTQy3-UTfBu_U8kl3lWLXQ_7Ki4gukN');

        async function loadProfile() {
            const { data: { user } } = await supabaseClient.auth.getUser();
            if (user) {
                // 1. Load User Info from 'userinfo' table
                const { data: p } = await supabaseClient.from('userinfo').select('*').eq('userid', user.id).single();
                
                // 2. Load Running Plans from 'investments' table
                const { data: plans } = await supabaseClient.from('investments').select('plan_name, amount, remaining_days, status').eq('userid', user.id);

                if (p) {
                    document.getElementById('user-display').innerText = p.username;
                    document.getElementById('phone').innerText = p.telephone || 'Not set';
                    document.getElementById('email').innerText = user.email;
                    document.getElementById('joined').innerText = new Date(user.created_at).toLocaleDateString('en-GB');
                    document.getElementById('plan').innerText = p.plan || 'Standard Member';
                    
                    const tableBody = document.getElementById('plans-table-body');
                    tableBody.innerHTML = '';

                    if (plans && plans.length > 0) {
                        plans.forEach(plan => {
                            // Column mapping: amount -> INVESTMENT, remaining_days -> DAYS LEFT, status -> GLOWING DOT
                            const isActive = plan.status === 'active';
                            const statusDotClass = isActive ? 'dot-running' : 'dot-stopped';
                            
                            tableBody.innerHTML += `
                                <tr>
                                    <td class="font-bold text-white">${plan.plan_name}</td>
                                    <td class="text-slate-400">UGX ${Number(plan.amount).toLocaleString()}</td>
                                    <td>
                                        <div class="flex items-center">
                                            <span class="dot ${statusDotClass}"></span>
                                            <span class="text-[10px] uppercase font-bold ${isActive ? 'text-green-400' : 'text-red-400'}">${plan.status}</span>
                                        </div>
                                    </td>
                                    <td class="font-bold text-slate-300">
                                        ${plan.remaining_days} Days
                                    </td>
                                </tr>
                            `;
                        });
                    } else {
                        tableBody.innerHTML = '<tr><td colspan="4" class="text-center text-slate-500 py-10">No investment plans found.</td></tr>';
                    }

                    document.getElementById('skeleton-view').classList.add('hidden');
                    document.getElementById('profile-content').classList.remove('hidden');
                }
            }
        }

        loadProfile();
    </script>
</body>
  </html>
