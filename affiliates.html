<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Affiliates | UPCASH</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #030712;
            color: #f8fafc;
        }
        .text-header-pro {
            color: #94a3b8;
        }
        .glass-card {
            background: rgba(30, 41, 59, 0.5);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        /* Skeleton Animation */
        .skeleton {
            background: linear-gradient(90deg, #1e293b 25%, #334155 50%, #1e293b 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite linear;
            border-radius: 8px;
        }
        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
        .hidden-load { display: none; }
    </style>
</head>
<body class="min-h-screen pb-10">

    <header class="p-4 flex items-center justify-between sticky top-0 bg-[#030712]/80 backdrop-blur-md z-50">
        <div class="flex items-center gap-3">
            <div class="bg-blue-600 p-2 rounded-lg shadow-lg shadow-blue-500/20">
                <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"></path>
                </svg>
            </div>
            <h1 class="text-xl font-extrabold tracking-tighter text-white uppercase">UP<span class="text-blue-500">CASH</span></h1>
        </div>
        <button onclick="window.history.back()" class="p-2 bg-white/5 rounded-full hover:bg-white/10 transition-all">
            <svg class="w-6 h-6 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
        </button>
    </header>

    <main class="max-w-md mx-auto px-4">
        
        <div id="summary-skeleton" class="mt-6 mb-8">
            <div class="glass-card p-6 rounded-[2rem]">
                <div class="skeleton h-4 w-32 mb-3"></div>
                <div class="skeleton h-10 w-48 mb-2"></div>
                <div class="skeleton h-3 w-40"></div>
            </div>
        </div>

        <div id="summary-real" class="mt-6 mb-8 hidden-load">
            <div class="glass-card p-6 rounded-[2rem] relative overflow-hidden">
                <div class="flex items-center gap-2 mb-2">
                    <svg class="w-4 h-4 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    <span class="text-xs font-semibold text-slate-400 uppercase tracking-widest">My Affiliate Bonuses</span>
                </div>
                <h2 id="total-bonuses" class="text-3xl font-black text-white">UGX *****</h2>
                <p class="text-[10px] text-slate-500 mt-1">Total combined commissions earned</p>
            </div>
        </div>

        <h3 class="text-lg font-bold text-header-pro flex items-center gap-2 mb-4 px-1">
            <svg class="w-5 h-5 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
            Affiliate Network
        </h3>

        <div class="glass-card rounded-3xl overflow-hidden border border-white/5">
            <div class="overflow-x-auto">
                <table class="w-full text-left text-sm border-collapse">
                    <thead>
                        <tr class="bg-white/5 text-slate-400 text-[10px] uppercase tracking-wider font-bold">
                            <th class="p-4">Username</th>
                            <th class="p-4">Level</th>
                            <th class="p-4 text-right">Bonus</th>
                        </tr>
                    </thead>
                    <tbody id="affiliate-list" class="divide-y divide-white/5">
                        <tr>
                            <td class="p-4"><div class="skeleton h-4 w-24"></div></td>
                            <td class="p-4"><div class="skeleton h-4 w-16"></div></td>
                            <td class="p-4 text-right"><div class="skeleton h-4 w-20 ml-auto"></div></td>
                        </tr>
                        <tr>
                            <td class="p-4"><div class="skeleton h-4 w-20"></div></td>
                            <td class="p-4"><div class="skeleton h-4 w-16"></div></td>
                            <td class="p-4 text-right"><div class="skeleton h-4 w-20 ml-auto"></div></td>
                        </tr>
                        <tr>
                            <td class="p-4"><div class="skeleton h-4 w-28"></div></td>
                            <td class="p-4"><div class="skeleton h-4 w-16"></div></td>
                            <td class="p-4 text-right"><div class="skeleton h-4 w-20 ml-auto"></div></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

    </main>

    <script>
        // Replace with your keys
        const SUPABASE_URL = 'https://wbodpfbmilhperccgzei.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_CTQy3-UTfBu_U8kl3lWLXQ_7Ki4gukN';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        async function loadAffiliatePage() {
            const { data: { user } } = await supabaseClient.auth.getUser();
            if (!user) {
                window.location.href = 'login.html';
                return;
            }

            const { data, error } = await supabaseClient
                .from('transactions')
                .select(`
                    amount,
                    description,
                    created_at,
                    provider:userinfo!provider_id (username)
                `)
                .eq('userid', user.id)
                .eq('type', 'referral_bonus')
                .order('created_at', { ascending: false });

            const tableBody = document.getElementById('affiliate-list');
            const totalDisplay = document.getElementById('total-bonuses');
            
            // Switch Skeletons off
            document.getElementById('summary-skeleton').classList.add('hidden-load');
            document.getElementById('summary-real').classList.remove('hidden-load');

            if (error || !data || data.length === 0) {
                tableBody.innerHTML = '<tr><td colspan="3" class="p-10 text-center text-slate-500 text-xs tracking-tight">No affiliate records found in your network.</td></tr>';
                totalDisplay.innerText = "UGX 0";
                return;
            }

            let totalSum = 0;

            tableBody.innerHTML = data.map(tx => {
                totalSum += parseFloat(tx.amount);
                
                let levelText = "2nd Indirect+";
                let levelClass = "text-slate-500";
                let bonusAmount = `UGX ${Number(tx.amount).toLocaleString()}`;

                if (tx.description.includes('10%')) {
                    levelText = "Direct";
                    levelClass = "text-emerald-400";
                } else if (tx.description.includes('2%')) {
                    levelText = "1st Indirect";
                    levelClass = "text-cyan-400";
                } else {
                    bonusAmount = "NULL"; 
                    levelClass = "text-slate-600";
                }

                return `
                    <tr class="transition-colors hover:bg-white/5">
                        <td class="p-4">
                            <div class="flex flex-col">
                                <span class="font-bold text-white tracking-tight">${tx.provider?.username || 'Member'}</span>
                                <span class="text-[9px] text-slate-500 font-medium">${new Date(tx.created_at).toLocaleDateString()}</span>
                            </div>
                        </td>
                        <td class="p-4">
                            <span class="px-2 py-0.5 rounded-full bg-white/5 text-[10px] font-bold ${levelClass}">
                                ${levelText}
                            </span>
                        </td>
                        <td class="p-4 text-right">
                            <span class="font-bold ${bonusAmount === 'NULL' ? 'text-slate-700' : 'text-white'}">
                                ${bonusAmount}
                            </span>
                        </td>
                    </tr>
                `;
            }).join('');

            totalDisplay.innerText = `UGX ${totalSum.toLocaleString()}`;
        }

        window.onload = loadAffiliatePage;
    </script>
</body>
</html>
