<!doctype html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0a0f1a">
    <title>UPCASH | Sign In</title>
    
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body { background-color: #0a0f1a; font-family: 'DM Sans', sans-serif; }
        .outfit { font-family: 'Outfit', sans-serif; }
        
        .icon-box {
            background: #00ce9c;
            border-radius: 12px;
            padding: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 20px rgba(0, 206, 156, 0.4);
        }

        .glass-card { 
            background: linear-gradient(160deg, #111827 0%, #0d1321 100%); 
            border: 1px solid rgba(0, 206, 156, 0.15);
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }
        
        /* Floating Label Logic */
        .input-container { position: relative; }

        .field { 
            width: 100%; 
            padding: 1rem 1rem 1rem 3rem; 
            border-radius: 0.75rem; 
            background: rgba(10, 15, 26, 0.5); 
            border: 1px solid rgba(255,255,255,0.08); 
            color: white; 
            outline: none; 
            transition: all 0.3s ease; 
        }

        .floating-label {
            position: absolute;
            left: 3rem;
            top: 50%;
            transform: translateY(-50%);
            background: #101624; 
            padding: 0 6px;
            color: #5a6477;
            font-size: 0.875rem;
            pointer-events: none;
            transition: all 0.2s ease;
        }

        .field:focus + .floating-label,
        .field:not(:placeholder-shown) + .floating-label {
            top: 0;
            font-size: 0.75rem;
            color: #00CE9C;
            transform: translateY(-50%) scale(0.9);
        }

        .field:focus { border-color: #00CE9C; box-shadow: 0 0 10px rgba(0, 206, 156, 0.1); }
        
        .input-icon { position: absolute; left: 1rem; top: 1.1rem; color: #00CE9C; opacity: 0.7; z-index: 10; }
        
        .btn-primary {
            background: #00CE9C;
            color: #0a0f1a;
            box-shadow: 0 10px 20px rgba(0,206,156,0.2);
            transition: all 0.3s ease;
        }
        .btn-primary:hover:not(:disabled) { transform: translateY(-2px); }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

        @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .fade-up { animation: fadeUp 0.6s ease forwards; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 sm:p-8">
    
    <div style="position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;overflow:hidden;z-index:0;">
        <div style="position:absolute;top:-20%;right:-15%;width:500px;height:500px;border-radius:50%;background:radial-gradient(circle,rgba(0,206,156,0.08) 0%,transparent 70%);"></div>
        <div style="position:absolute;bottom:-10%;left:-10%;width:400px;height:400px;border-radius:50%;background:radial-gradient(circle,rgba(0,206,156,0.05) 0%,transparent 70%);"></div>
    </div>

    <div class="relative z-10 w-full max-w-md fade-up">
        
        <header class="text-center mb-8">
            <div class="flex items-center justify-center gap-4 mb-2">
               <div class="icon-box">
                 <i data-lucide="trending-up" style="width: 32px; height: 32px; color: #0a0f1a; stroke-width: 3px;"></i>
               </div>
               <h1 class="outfit font-900 text-5xl tracking-tighter text-white uppercase">
                   UP<span style="color:#00ce9c;">CASH</span>
               </h1>
            </div>
            <p class="outfit font-300 text-sm text-[#00CE9C] tracking-[3px] uppercase mt-2">Welcome Back Trader</p>
        </header>

        <div class="glass-card rounded-3xl p-8 sm:p-10">
            <form id="signinForm" class="space-y-6">
                
                <div class="input-container">
                    <i data-lucide="mail" class="input-icon w-5 h-5"></i>
                    <input type="email" id="email" required placeholder=" " class="field">
                    <label class="floating-label">Email Address</label>
                </div>

                <div class="input-container">
                    <i data-lucide="lock" class="input-icon w-5 h-5"></i>
                    <input type="password" id="password" required placeholder=" " class="field">
                    <label class="floating-label">Password</label>
                </div>

                <div class="flex justify-end">
                    <a href="forgot-password.html" class="text-xs text-slate-500 hover:text-[#00CE9C] transition-colors">Forgot Password?</a>
                </div>

                <button type="submit" id="submitBtn" class="btn-primary w-full py-4 rounded-xl outfit font-bold text-lg">
                    Sign In
                </button>
            </form>

            <div class="mt-8 text-center pt-4 border-t border-white/5">
                <p class="text-slate-500 text-sm">New to the platform? <a href="register.html" class="text-[#00CE9C] font-bold hover:underline">Create Account</a></p>
            </div>
        </div>
        
        <footer class="mt-8 text-center">
            <div class="flex flex-wrap justify-center gap-4 text-[10px] text-[#3e4a5c] outfit tracking-widest uppercase">
                <span class="flex items-center gap-1"><i data-lucide="shield-check" class="w-3 h-3"></i> Encrypted Session</span>
                <span class="flex items-center gap-1"><i data-lucide="globe" class="w-3 h-3"></i> Uganda Server</span>
            </div>
            <p class="mt-4 text-[#2a3441] text-[10px]">© UPCASH BUSINESS PLATFORM 2026</p>
        </footer>
    </div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    // Initialize Icons
    lucide.createIcons();

    // Initialize Supabase
    const supabaseClient = supabase.createClient('https://wbodpfbmilhperccgzei.supabase.co', 'sb_publishable_CTQy3-UTfBu_U8kl3lWLXQ_7Ki4gukN');
    const form = document.getElementById('signinForm');
    const submitBtn = document.getElementById('submitBtn');
    
    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        // UI Feedback
        submitBtn.innerText = "Authenticating...";
        submitBtn.disabled = true;
        
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;

        const { data, error } = await supabaseClient.auth.signInWithPassword({
            email: email,
            password: password
        });

        if (error) {
            alert("Login Failed: " + error.message);
            submitBtn.innerText = "Sign In";
            submitBtn.disabled = false;
        } else {
            // Successful login
            window.location.href = "dashboard.html";
        }
    });
</script>
</body>
    </html>
